<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAM GTA — PRD vs Prototype Gap Analysis</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    background: #0a0a0f;
    color: #e8e6e3;
    line-height: 1.5;
    padding: 24px;
  }

  .header {
    max-width: 1100px;
    margin: 0 auto 32px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    color: #C8A84E;
  }

  .header p {
    font-size: 14px;
    color: #8a8a8a;
    margin-top: 4px;
  }

  .stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat-pill {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid #222;
    background: #111;
  }

  .stat-pill .num { font-size: 18px; margin-right: 4px; }
  .stat-pill.pending .num { color: #C8A84E; }
  .stat-pill.agreed .num { color: #3EAF5C; }
  .stat-pill.changed .num { color: #e06040; }

  .filter-bar {
    max-width: 1100px;
    margin: 0 auto 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 16px;
    border: 1px solid #333;
    background: #111;
    color: #aaa;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 120ms;
  }

  .filter-btn:hover { border-color: #C8A84E; color: #C8A84E; }
  .filter-btn.active { background: #C8A84E; color: #000; border-color: #C8A84E; }

  .sections { max-width: 1100px; margin: 0 auto; }

  .section {
    margin-bottom: 28px;
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    background: #0f0f14;
  }

  .section-header {
    padding: 16px 20px;
    background: #111118;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .section-header:hover { background: #161620; }

  .section-header h2 {
    font-size: 16px;
    font-weight: 700;
  }

  .section-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 10px;
    background: rgba(200,168,78,0.1);
    color: #C8A84E;
  }

  .section-body { padding: 0; }
  .section-body.collapsed { display: none; }

  .item {
    padding: 14px 20px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: background 120ms;
  }

  .item:last-child { border-bottom: none; }
  .item:hover { background: rgba(200,168,78,0.02); }

  .item-status {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }

  .item-status.yes { background: #3EAF5C; }
  .item-status.partial { background: #C8A84E; }
  .item-status.no { background: #e06040; }
  .item-status.backend { background: #555; }

  .item-content { flex: 1; min-width: 0; }

  .item-req {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .item-note {
    font-size: 12px;
    color: #777;
    margin-bottom: 8px;
  }

  .item-rec {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 8px;
    display: inline-block;
    margin-bottom: 8px;
  }

  .rec-p1 { background: rgba(100,100,255,0.1); color: #8888ff; }
  .rec-backend { background: rgba(100,100,100,0.15); color: #888; }
  .rec-update { background: rgba(62,175,92,0.1); color: #3EAF5C; }
  .rec-done { background: rgba(62,175,92,0.1); color: #3EAF5C; }

  .feedback-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .fb-btn {
    padding: 4px 12px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #111;
    color: #aaa;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 100ms;

  .fb-btn:hover { border-color: #C8A84E; color: #C8A84E; }
  .fb-btn.selected-agree { background: #3EAF5C; color: #000; border-color: #3EAF5C; }
  .fb-btn.selected-p0 { background: #C8A84E; color: #000; border-color: #C8A84E; }
  .fb-btn.selected-p1 { background: #6666dd; color: #fff; border-color: #6666dd; }
  .fb-btn.selected-remove { background: #e06040; color: #fff; border-color: #e06040; }
  .fb-btn.selected-backend { background: #555; color: #fff; border-color: #555; }

    margin-top: 6px;
    width: 100%;
  }

  .fb-note input {
    width: 100%;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #222;
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: inherit;
    font-size: 12px;
  }

  .fb-note input::placeholder { color: #444; }
  .fb-note input:focus { outline: none; border-color: #C8A84E; }

  .export-bar {
    max-width: 1100px;
    margin: 32px auto;
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .export-btn {
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 120ms;
  }

  .export-btn.primary {
    background: #C8A84E;
    color: #000;
  }

  .export-btn.primary:hover { background: #d4b85e; }

  .export-btn.secondary {
    background: #1a1a1a;
    color: #aaa;
    border: 1px solid #333;
  }

  .export-btn.secondary:hover { border-color: #C8A84E; color: #C8A84E; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #3EAF5C;
    color: #000;
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 14px;
    transition: transform 300ms ease;
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .legend {
    max-width: 1100px;
    margin: 0 auto 20px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
    color: #666;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>BAM GTA — Gap Analysis</h1>
    <p>PRD P0 requirements vs. prototype — review each recommendation</p>
  </div>
  <div class="stats-bar">
    <div class="stat-pill pending"><span class="num" id="stat-pending">0</span> pending</div>
    <div class="stat-pill agreed"><span class="num" id="stat-agreed">0</span> agreed</div>
    <div class="stat-pill changed"><span class="num" id="stat-changed">0</span> changed</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3EAF5C"></div> In prototype</div>
  <div class="legend-item"><div class="legend-dot" style="background:#C8A84E"></div> Partial</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e06040"></div> Missing</div>
  <div class="legend-item"><div class="legend-dot" style="background:#555"></div> Backend only</div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterItems('all')">All</button>
  <button class="filter-btn" onclick="filterItems('add')">Add to Prototype</button>
  <button class="filter-btn" onclick="filterItems('p1')">Move to P1</button>
  <button class="filter-btn" onclick="filterItems('backend')">Backend</button>
  <button class="filter-btn" onclick="filterItems('update')">Update PRD</button>
  <button class="filter-btn" onclick="filterItems('done')">Already Done</button>
  <button class="filter-btn" onclick="filterItems('gaps-only')">Gaps Only</button>
</div>

<div class="sections" id="sections"></div>

<div class="export-bar">
  <button class="export-btn primary" onclick="exportFeedback()">Copy Feedback Summary</button>
  <button class="export-btn secondary" onclick="resetAll()">Reset All</button>
</div>

<div class="toast" id="toast"></div>

let feedbackState = {};

function render() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  DATA.forEach((section, si) => {
    const gaps = section.items.filter(i => i.rec !== 'done').length;
    const div = document.createElement('div');
    div.className = 'section';
    div.setAttribute('data-section', si);

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si})">
        <h2>${section.section}</h2>
        <span class="section-badge">${gaps} gap${gaps !== 1 ? 's' : ''} · ${section.items.length} total</span>
      </div>
      <div class="section-body" id="body-${si}">
        ${section.items.map((item, ii) => renderItem(si, ii, item)).join('')}
      </div>
    `;
    container.appendChild(div);
  });

  updateStats();
}

function renderItem(si, ii, item) {
  const key = `${si}-${ii}`;
  const fb = feedbackState[key] || {};
  const recClass = item.rec === 'add' ? 'rec-add' : item.rec === 'p1' ? 'rec-p1' : item.rec === 'backend' ? 'rec-backend' : item.rec === 'update' ? 'rec-update' : 'rec-done';

  const choices = item.rec === 'done' ? [] : ['agree', 'p0', 'p1', 'remove', 'backend'];

  return `
    <div class="item" data-rec="${item.rec}" data-status="${item.status}" data-key="${key}">
      <div class="item-status ${item.status}"></div>
      <div class="item-content">
        <div class="item-req">${item.req}</div>
        ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
        <div class="item-rec ${recClass}">${item.recLabel}</div>
        ${choices.length > 0 ? `
          <div class="feedback-row">
            ${choices.map(c => {
              const labels = { agree: '👍 Agree', p0: 'Keep P0', p1: 'Move to P1', remove: 'Remove', backend: 'Backend' };
              const sel = fb.choice === c ? `selected-${c}` : '';
              return `<button class="fb-btn ${sel}" onclick="setFeedback('${key}','${c}')">${labels[c]}</button>`;
            }).join('')}
          </div>
          <div class="fb-note">
            <input placeholder="Optional note..." value="${fb.note || ''}" onchange="setNote('${key}', this.value)" />
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function toggleSection(si) {
  const body = document.getElementById(`body-${si}`);
  body.classList.toggle('collapsed');
}

function setFeedback(key, choice) {
  if (!feedbackState[key]) feedbackState[key] = {};
  feedbackState[key].choice = feedbackState[key].choice === choice ? null : choice;
  render();
}

function setNote(key, note) {
  if (!feedbackState[key]) feedbackState[key] = {};
  feedbackState[key].note = note;
  updateStats();
}

function updateStats() {
  let pending = 0, agreed = 0, changed = 0;
  DATA.forEach((section, si) => {
    section.items.forEach((item, ii) => {
      if (item.rec === 'done') return;
      const key = `${si}-${ii}`;
      const fb = feedbackState[key];
      if (!fb || !fb.choice) pending++;
      else if (fb.choice === 'agree') agreed++;
      else changed++;
    });
  });
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-agreed').textContent = agreed;
  document.getElementById('stat-changed').textContent = changed;
}

function filterItems(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  document.querySelectorAll('.item').forEach(el => {
    const rec = el.getAttribute('data-rec');
    const status = el.getAttribute('data-status');
    if (type === 'all') el.style.display = '';
    else if (type === 'gaps-only') el.style.display = (rec === 'done') ? 'none' : '';
    else if (type === 'add') el.style.display = (rec === 'add') ? '' : 'none';
    else if (type === 'p1') el.style.display = (rec === 'p1') ? '' : 'none';
    else if (type === 'backend') el.style.display = (rec === 'backend') ? '' : 'none';
    else if (type === 'update') el.style.display = (rec === 'update') ? '' : 'none';
    else if (type === 'done') el.style.display = (rec === 'done') ? '' : 'none';
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportFeedback() {
  let lines = ['BAM GTA GAP ANALYSIS — FEEDBACK SUMMARY', '='.repeat(50), ''];

  DATA.forEach((section, si) => {
    let sectionLines = [];
    section.items.forEach((item, ii) => {
      if (item.rec === 'done') return;
      const key = `${si}-${ii}`;
      const fb = feedbackState[key];
      const choice = fb?.choice || 'NO RESPONSE';
      const note = fb?.note ? ` — "${fb.note}"` : '';
      const labels = { agree: 'AGREED', p0: 'KEEP P0', p1: 'MOVE TO P1', remove: 'REMOVE', backend: 'BACKEND' };
      sectionLines.push(`  [${labels[choice] || choice}] ${item.req}${note}`);
    });
    if (sectionLines.length > 0) {
      lines.push(section.section);
      lines.push('-'.repeat(40));
      lines = lines.concat(sectionLines);
      lines.push('');
    }
  });

  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    showToast('Copied to clipboard!');
  });
}

function resetAll() {
  feedbackState = {};
  render();
  showToast('Reset all feedback');
}

render();
</script>
