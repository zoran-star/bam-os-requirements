<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAM OS — Onboarding Review: Product & Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F8F7F5;--surf:#FFF;--surf2:#FAFAF8;--surf3:#F0EFEC;--border:rgba(0,0,0,.07);--borderm:rgba(0,0,0,.12);--gold:#C8A84E;--goldd:#A08030;--gglow:rgba(200,168,78,.10);--tp:#1C1B18;--ts:#6E6B63;--tm:#A5A19A;--green:#3EAF5C;--greenl:rgba(62,175,92,.10);--warn:#E09D24;--warnl:rgba(224,157,36,.10);--red:#E05A42;--redl:rgba(224,90,66,.10);--blue:#3B6FA0;--bluel:rgba(59,111,160,.10);--ff:'Plus Jakarta Sans',sans-serif;--fm:'DM Mono',monospace;--shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);--shadow-md:0 4px 14px rgba(0,0,0,.06),0 2px 6px rgba(0,0,0,.04);--r-sm:8px;--r-md:12px;--r-lg:16px;--r-full:9999px}
[data-theme=dark]{--bg:#0F0E0C;--surf:#1A1916;--surf2:#222120;--surf3:#2C2B28;--border:rgba(255,255,255,.08);--borderm:rgba(255,255,255,.12);--gold:#D4B65C;--goldd:#E0C56A;--gglow:rgba(212,182,92,.12);--tp:#F0EDE8;--ts:#A5A19A;--tm:#6E6B63;--green:#4CC76A;--greenl:rgba(76,199,106,.12);--warn:#F0B84A;--warnl:rgba(240,184,74,.12);--red:#F07060;--redl:rgba(240,112,96,.12);--blue:#5A9FD4;--bluel:rgba(90,159,212,.12);--shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-md:0 4px 14px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--ff);background:var(--bg);color:var(--tp);line-height:1.5;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--border);padding:20px 32px;box-shadow:var(--shadow-sm)}.header-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}.header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}.header h1 span{color:var(--gold)}.header-sub{font-size:13px;color:var(--tm);margin-top:2px}.header-actions{display:flex;gap:8px;align-items:center}.step-indicator{font-family:var(--fm);font-size:12px;color:var(--gold);background:var(--gglow);padding:4px 12px;border-radius:var(--r-full);font-weight:600}
.btn{font-family:var(--ff);font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;transition:all .15s ease;display:inline-flex;align-items:center;gap:6px}.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--goldd)}.btn-outline{background:transparent;border:1px solid var(--borderm);color:var(--ts)}.btn-outline:hover{background:var(--surf3)}.btn-red{background:transparent;border:1px solid var(--borderm);color:var(--red)}.btn-red:hover{background:var(--redl)}.btn-theme{background:transparent;border:1px solid var(--borderm);color:var(--ts);padding:8px 10px;font-size:15px;line-height:1}
.progress-bar{margin-top:14px;display:flex;align-items:center;gap:12px}.progress-track{flex:1;height:6px;background:var(--surf3);border-radius:var(--r-full);overflow:hidden}.progress-fill{height:100%;background:var(--gold);border-radius:var(--r-full);transition:width .3s ease}.progress-label{font-size:13px;font-weight:600;color:var(--ts);white-space:nowrap;font-family:var(--fm)}
.container{max-width:920px;margin:0 auto;padding:24px 32px 80px}.intro{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;margin-bottom:32px}.intro h2{font-size:18px;font-weight:700;margin-bottom:4px}.intro p{font-size:14px;color:var(--ts);line-height:1.6}
.subsection{margin-top:16px;margin-bottom:20px}.subsection-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tm);margin-bottom:8px;padding-left:4px}
.row{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:6px;transition:border-color .15s ease,box-shadow .15s ease}.row:hover{border-color:var(--borderm);box-shadow:var(--shadow-sm)}.row.approved{border-color:rgba(62,175,92,.25);background:linear-gradient(135deg,var(--surf) 0%,var(--greenl) 100%)}
.row-check{flex-shrink:0;margin-top:2px}.row-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);cursor:pointer}.row-content{flex:1;min-width:0}.row-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.row-id{font-family:var(--fm);font-size:11px;font-weight:500;color:var(--gold);background:var(--gglow);padding:2px 8px;border-radius:var(--r-full);white-space:nowrap}.row-title{font-size:14px;font-weight:600;color:var(--tp)}.row-desc{font-size:13px;color:var(--ts);margin-top:2px}.row-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:600;padding:2px 10px;border-radius:var(--r-full);white-space:nowrap}.pill-green{background:var(--greenl);color:var(--green)}.pill-gold{background:var(--warnl);color:var(--warn)}.pill-gray{background:var(--surf3);color:var(--tm)}.pill-blue{background:var(--bluel);color:var(--blue)}.pill-outline{background:transparent;border:1px solid var(--border);color:var(--tm)}
.row-feedback{flex-shrink:0;width:240px}.row-feedback input{width:100%;font-family:var(--ff);font-size:13px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surf2);color:var(--tp);outline:none;transition:border-color .15s ease}.row-feedback input::placeholder{color:var(--tm)}.row-feedback input:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gglow)}.row-feedback input.has-text{border-color:var(--warn);background:var(--warnl)}
.section-feedback{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 20px;margin-top:28px}.section-feedback label{font-size:13px;font-weight:600;color:var(--tp);display:block;margin-bottom:6px}.section-feedback textarea{width:100%;font-family:var(--ff);font-size:13px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surf2);color:var(--tp);outline:none;resize:vertical;min-height:60px;line-height:1.5}.section-feedback textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gglow)}
.footer-actions{display:flex;justify-content:space-between;align-items:center;padding-top:24px;border-top:1px solid var(--border);margin-top:32px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--tp);color:var(--bg);font-family:var(--ff);font-size:14px;font-weight:600;padding:12px 24px;border-radius:var(--r-md);box-shadow:var(--shadow-md);opacity:0;transition:all .3s ease;z-index:200;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}.modal-overlay.show{display:flex}.modal{background:var(--surf);border-radius:var(--r-lg);padding:24px;max-width:380px;width:90%;box-shadow:var(--shadow-md)}.modal h3{font-size:16px;font-weight:700;margin-bottom:8px}.modal p{font-size:14px;color:var(--ts);margin-bottom:20px}.modal-actions{display:flex;gap:8px;justify-content:flex-end}
@media(max-width:768px){.header{padding:16px 20px}.container{padding:16px 20px 60px}.row{flex-wrap:wrap}.row-feedback{width:100%}}
@media print{.header{position:static;box-shadow:none}.header-actions{display:none}.progress-bar{display:none}.row{break-inside:avoid;box-shadow:none}.toast,.modal-overlay{display:none!important}}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <h1>BAM <span>OS</span> — Product & Pricing</h1>
      <div class="header-sub">Section 5 of 8 — Review what data belongs here</div>
    </div>
    <div class="header-actions">
      <span class="step-indicator">5 / 8</span>
      <button class="btn btn-theme" onclick="toggleTheme()" id="themeBtn">&#9790;</button>
      <button class="btn btn-red" onclick="showClearModal()">Clear</button>
      <button class="btn btn-gold" onclick="exportSection()">Export for AI</button>
    </div>
  </div>
  <div class="progress-bar">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0 reviewed</div>
  </div>
</div>
<div class="container" id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="clearModal">
  <div class="modal">
    <h3>Clear all progress?</h3>
    <p>This will uncheck all items and remove all feedback. This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="hideClearModal()">Cancel</button>
      <button class="btn btn-red" onclick="clearAll()">Clear All</button>
    </div>
  </div>
</div>
<script>
const SECTION = {
  id: "5",
  title: "Product & Pricing",
  desc: "What the academy sells. This is the biggest section because it defines offers, plans, pricing, discounts, and how everything ties together. The key question from v1 review: what\u2019s the relationship between Offer Builder (PRD-001), Subscription Plans (PRD-002), and Membership Plans (SET-003)? Also includes Business Description (moved from Identity) and Skill Levels (moved from Staff).",
  subsections: [
    {
      id: "5A",
      title: "Business Description & Services",
      items: [
        { id: "5A-01", title: "Business Description", desc: "1\u20132 sentence summary of what the business does and what services they offer. Moved here from Identity \u2014 belongs with the product definition.", phase: "Onboarding", source: "AI-Suggested", required: true },
        { id: "5A-02", title: "Sport / Activity Type", desc: "What sport or activity (basketball, soccer, multi-sport, fitness). Determines terminology and UI throughout the platform.", phase: "Onboarding", source: "Manual", required: true },
        { id: "5A-03", title: "Service Types Offered", desc: "What do you offer? Group classes, private training, camps, clinics, online programs, open gym. Defines product catalog structure.", phase: "Onboarding", source: "Manual", required: true },
        { id: "5A-04", title: "Age Range", desc: "Minimum and maximum age of athletes accepted. Determines product eligibility and lead qualification.", phase: "Onboarding", source: "Manual", required: true },
        { id: "5A-05", title: "Skill Levels", desc: "What skill levels the program accepts (all levels, beginner, intermediate, advanced). Moved from Staff \u2014 this is about product eligibility.", phase: "Onboarding", source: "Manual", required: true },
      ]
    },
    {
      id: "5B",
      title: "Offer Builder",
      items: [
        { id: "5B-01", title: "Training Offer Definition", desc: "The core offer: what does the athlete get? Target age, skill level, session format (group/private/both), session duration, frequency. This is the \u201Cwhat\u201D of the product. (PRD-001)", phase: "Onboarding", source: "Manual", required: true },
        { id: "5B-02", title: "Offer Name & Description", desc: "Human-readable name and description for each offer. Shown to members in scheduling app and on booking pages. Can be AI-suggested from the offer details.", phase: "Onboarding", source: "AI-Suggested", required: true },
        { id: "5B-03", title: "Offer Inclusions", desc: "What\u2019s included beyond training: video review, custom programming, WhatsApp access, merchandise, etc. Differentiates tiers.", phase: "Onboarding", source: "Manual", required: false },
        { id: "5B-04", title: "Location Assignment", desc: "Which locations offer this product. Some offers may be location-specific (e.g. outdoor camp only at park location).", phase: "Onboarding", source: "Manual", required: true },
      ]
    },
    {
      id: "5C",
      title: "Pricing & Plans",
      items: [
        { id: "5C-01", title: "Pricing Model", desc: "How is this offer priced? Monthly subscription, per-session, credit pack, or flat fee. Determines Stripe setup.", phase: "Onboarding", source: "Manual", required: true },
        { id: "5C-02", title: "Subscription Plans", desc: "For recurring billing: plan name, cadence (weekly/monthly), credits per cycle, commitment length, post-commitment behavior. (PRD-002)", phase: "Onboarding", source: "Manual", required: true },
        { id: "5C-03", title: "Pricing Tiers", desc: "Different price points for the same offer (e.g. 1x/week $200, 2x/week $280, unlimited $565). The full pricing table.", phase: "Onboarding", source: "Manual", required: true },
        { id: "5C-04", title: "Trial Period", desc: "Free or discounted trial before first charge. Duration in days, what\u2019s included, auto-charge at end. Per-plan configuration.", phase: "Onboarding", source: "Manual", required: false },
        { id: "5C-05", title: "Session Packages", desc: "Pre-paid credit bundles (e.g. 10-pack) with set expiry. Alternative to subscription for drop-in athletes. (PRD-006)", phase: "Settings", source: "Manual", required: false },
        { id: "5C-06", title: "Pay-Per-Session", desc: "Single-session drop-in pricing with optional expiry. Simplest pricing model. (PRD-007)", phase: "Settings", source: "Manual", required: false },
        { id: "5C-07", title: "Pricing Transparency Mode", desc: "How the AI handles pricing questions: show exact prices, show a range, or hide until after trial. Business-wide setting.", phase: "Onboarding", source: "Manual", required: true },
      ]
    },
    {
      id: "5D",
      title: "Discounts & Incentives",
      items: [
        { id: "5D-01", title: "Sibling Discount", desc: "Discount for families with multiple athletes. Flat amount, percentage, or custom (e.g. \u201C50% off each additional sibling\u201D).", phase: "Settings", source: "Manual", required: false },
        { id: "5D-02", title: "Referral Discount", desc: "What existing members get for referring new athletes. Free month, credit, percentage off. Drives word-of-mouth.", phase: "Settings", source: "Manual", required: false },
        { id: "5D-03", title: "Prepayment Discounts", desc: "Discounts for 3-month, 6-month, or annual prepayment. Can be auto-imported from Stripe if plans already exist.", phase: "Settings", source: "Stripe Import", required: false },
        { id: "5D-04", title: "Promo Codes", desc: "One-time discount codes: type (percentage/flat), amount, expiry date, usage limits. Used in campaigns and partner deals.", phase: "Settings", source: "Manual", required: false },
        { id: "5D-05", title: "Seasonal Promotions", desc: "Time-limited pricing events (back to school, new year, summer). When are signups highest/lowest? Moved from Strategy.", phase: "Settings", source: "Manual", required: false },
      ]
    },
    {
      id: "5E",
      title: "Schedule Integration",
      items: [
        { id: "5E-01", title: "Coach Ratio per Class", desc: "Number of coaches per session type. Moved from Staff. Defined per product/class type, not per coach.", phase: "First Week", source: "Manual", required: false },
        { id: "5E-02", title: "Group Size Limits", desc: "Max athletes per class type. Moved from Staff. Tied to the product definition, not the location.", phase: "Onboarding", source: "Manual", required: true },
        { id: "5E-03", title: "Session Duration", desc: "How long each class/session lasts. May vary by product type (group = 60min, private = 45min).", phase: "Onboarding", source: "Manual", required: true },
        { id: "5E-04", title: "Private Training Availability", desc: "Whether 1-on-1 private sessions are available and any restrictions (members only, separate pricing, specific coaches).", phase: "Settings", source: "Manual", required: false },
      ]
    },
    {
      id: "5F",
      title: "Holiday & Calendar",
      items: [
        { id: "5F-01", title: "Holiday Schedule Impact", desc: "Does the holiday schedule affect billing? (e.g. no class on holidays but still charged, or prorated). Moved from Locations \u2014 this is a product/billing decision.", phase: "Settings", source: "Manual", required: false },
        { id: "5F-02", title: "Camp / Special Programs", desc: "One-off or seasonal programs (summer camp, March break, holiday clinics). Different from recurring subscriptions \u2014 separate product type.", phase: "Settings", source: "Manual", required: false },
      ]
    },
    {
      id: "5G",
      title: "Open Questions",
      items: [
        { id: "5G-01", title: "Offer vs Plan vs Product", desc: "What\u2019s the hierarchy? Recommendation: an Offer is what the athlete gets (training definition). A Plan is how they pay (subscription/pack/drop-in). A Product ties an Offer to a Plan at a Location.", phase: "Onboarding", source: "Manual", required: false },
        { id: "5G-02", title: "Credit System", desc: "Should all plans use credits (book X sessions per cycle) or should unlimited plans bypass credits entirely? Affects booking logic.", phase: "Onboarding", source: "Manual", required: false },
        { id: "5G-03", title: "Overage Handling", desc: "What happens when a member uses all their credits but wants to book more? Block, charge per-session, or allow with warning?", phase: "Settings", source: "Manual", required: false },
        { id: "5G-04", title: "Plan Migration", desc: "If an existing academy has members on plans in Stripe already, can we import those? Or do they need to recreate everything?", phase: "Onboarding", source: "Stripe Import", required: false },
        { id: "5G-05", title: "Makeup Credits", desc: "When a member misses a session, do they get a makeup credit? How long does it last? Is this a policy or product setting?", phase: "Settings", source: "Manual", required: false },
      ]
    }
  ]
};

const STORAGE_KEY='bamos_review_product';let state=loadState();
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return{}}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function getAllItems(){const items=[];SECTION.subsections.forEach(sub=>sub.items.forEach(item=>items.push(item)));return items}
function render(){
  const app=document.getElementById('app');let html='';
  html+=`<div class="intro"><h2>${SECTION.title}</h2><p>${SECTION.desc}</p></div>`;
  SECTION.subsections.forEach(sub=>{
    html+=`<div class="subsection"><div class="subsection-title">${sub.id}: ${sub.title}</div>`;
    sub.items.forEach(item=>{
      const checked=state[item.id]?.checked||false;const feedback=state[item.id]?.feedback||'';
      const ac=checked?' approved':'';const ht=feedback?' has-text':'';
      const pc=item.phase==='Onboarding'?'pill-green':item.phase==='First Week'?'pill-gold':'pill-gray';
      const sc=item.source==='AI-Suggested'?'pill-gold':item.source==='Stripe Import'?'pill-blue':'pill-outline';
      const rb=item.required?`<span class="pill pill-green" style="font-size:10px">Required</span>`:'';
      html+=`<div class="row${ac}" id="row-${item.id}"><div class="row-check"><input type="checkbox" ${checked?'checked':''} onchange="toggleCheck('${item.id}',this.checked)"></div><div class="row-content"><div class="row-top"><span class="row-id">${item.id}</span><span class="row-title">${item.title}</span>${rb}</div><div class="row-desc">${item.desc}</div><div class="row-tags"><span class="pill ${pc}">${item.phase}</span><span class="pill ${sc}">${item.source}</span></div></div><div class="row-feedback"><input type="text" placeholder="Feedback..." value="${escapeAttr(feedback)}" class="${ht}" oninput="updateFeedback('${item.id}',this.value,this)"></div></div>`;
    });html+=`</div>`;
  });
  html+=`<div class="section-feedback"><label>Overall feedback on this section</label><textarea id="sectionFeedback" placeholder="Anything missing, unclear, or that should be reorganized?" oninput="saveSectionFeedback(this.value)">${escapeHtml(state._sectionFeedback||'')}</textarea></div>`;
  html+=`<div class="footer-actions"><button class="btn btn-outline" onclick="exportSection()">Export for AI</button><div style="font-size:13px;color:var(--tm)">Prev: Staff \u00A0\u00B7\u00A0 Next: Policy</div></div>`;
  app.innerHTML=html;updateProgress();
}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toggleCheck(id,c){if(!state[id])state[id]={};state[id].checked=c;saveState();document.getElementById('row-'+id)?.classList.toggle('approved',c);updateProgress()}
function updateFeedback(id,v,el){if(!state[id])state[id]={};state[id].feedback=v;saveState();el.classList.toggle('has-text',v.length>0);updateProgress()}
function saveSectionFeedback(v){state._sectionFeedback=v;saveState()}
function updateProgress(){const a=getAllItems();let r=0;a.forEach(i=>{const s=state[i.id];if(s&&(s.checked||(s.feedback&&s.feedback.trim())))r++});const p=Math.round(r/a.length*100);document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressLabel').textContent=`${r} / ${a.length} reviewed`}
function exportSection(){
  const a=getAllItems();const d=new Date().toISOString().split('T')[0];let ap=0,wf=0,pe=0;
  a.forEach(i=>{const s=state[i.id];if(s?.checked&&!s?.feedback?.trim())ap++;else if(s?.feedback?.trim())wf++;else pe++});
  let md=`# BAM OS Onboarding \u2014 Section 5: Product & Pricing\n**Exported:** ${d}\n**Approved:** ${ap} | **Has feedback:** ${wf} | **Pending:** ${pe}\n\n`;
  SECTION.subsections.forEach(sub=>{md+=`## ${sub.id}: ${sub.title}\n`;sub.items.forEach(i=>{const s=state[i.id];const c=s?.checked||false;const fb=s?.feedback?.trim()||'';let l=`- ${c?'[x]':'[ ]'} **${i.id} ${i.title}** \u2014 ${i.desc}`;if(c&&!fb)l+=' \u2014 APPROVED';else if(fb)l+=` \u2014 FEEDBACK: "${fb}"`;const t=[];if(i.required)t.push('Required');t.push(i.phase);t.push(i.source);l+=` [${t.join(', ')}]`;md+=l+'\n'});md+='\n'});
  const fi=[];a.forEach(i=>{const fb=state[i.id]?.feedback?.trim();if(fb)fi.push({id:i.id,title:i.title,feedback:fb})});
  if(fi.length>0){md+=`## All Feedback (Consolidated)\n`;fi.forEach((f,i)=>{md+=`${i+1}. **${f.id} ${f.title}:** "${f.feedback}"\n`});md+='\n'}
  if(state._sectionFeedback?.trim())md+=`## Overall Section Feedback\n${state._sectionFeedback.trim()}\n`;
  navigator.clipboard.writeText(md).then(()=>showToast('Copied to clipboard')).catch(()=>{const ta=document.createElement('textarea');ta.value=md;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied to clipboard')});
}
function showClearModal(){document.getElementById('clearModal').classList.add('show')}
function hideClearModal(){document.getElementById('clearModal').classList.remove('show')}
function clearAll(){state={};saveState();hideClearModal();render();showToast('All progress cleared')}
function toggleTheme(){const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('bamos_theme',n);document.getElementById('themeBtn').textContent=n==='dark'?'\u2600':'\u263E'}
(function(){const t=localStorage.getItem('bamos_theme');if(t){document.documentElement.setAttribute('data-theme',t);if(t==='dark')document.getElementById('themeBtn').textContent='\u2600'}})();
function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}
render();
</script>
</body>
</html>
