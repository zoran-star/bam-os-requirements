<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAM OS — Member Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #080808;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --bg-card-hover: #222222;
            --border: #2a2a2a;
            --border-accent: #333333;
            --gold: #C9B97A;
            --gold-light: #E2DD9F;
            --gold-dim: rgba(201, 185, 122, 0.15);
            --text-primary: #f0f0f0;
            --text-secondary: #888888;
            --text-dim: #555555;
            --green: #4caf50;
            --red: #f44336;
            --yellow: #f5c842;
            --blue: #45b7d1;
            --purple: #b388ff;
            --zone-green: #4caf50;
            --zone-yellow: #f5c842;
            --zone-red: #f44336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Fixed Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .header-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            gap: 16px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 200px;
        }

        .header-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--gold);
            letter-spacing: 3px;
        }

        .header-subtitle {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .header-academy {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .header-period {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 200px;
            justify-content: flex-end;
        }

        .academy-score-widget {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px 14px;
        }

        .score-ring {
            width: 44px;
            height: 44px;
            position: relative;
        }

        .score-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .score-ring-bg {
            fill: none;
            stroke: var(--border);
            stroke-width: 3;
        }

        .score-ring-fill {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .score-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            color: var(--text-primary);
        }

        .score-label {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .score-label-title {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-label-delta {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
        }

        .comparison-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
        }

        .comparison-select:focus {
            border-color: var(--gold);
        }

        .header-pills {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 24px 10px;
            border-top: 1px solid var(--border);
        }

        .tier-pill {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .tier-pill-basic {
            background: var(--gold);
            color: var(--bg-primary);
            border: 1px solid var(--gold);
        }

        .tier-pill-advanced {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-accent);
        }

        .tier-pill-advanced.active {
            background: var(--gold-dim);
            color: var(--gold);
            border-color: var(--gold);
        }

        .tier-pill-internal {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .tier-pill-internal.active {
            background: rgba(244, 67, 54, 0.1);
            color: var(--red);
            border-color: var(--red);
        }

        /* Main Content */
        .main {
            padding-top: 120px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 24px;
            padding-right: 24px;
            padding-bottom: 80px;
        }

        /* Tier Sections */
        .tier-section {
            margin-bottom: 40px;
        }

        .tier-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .tier-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 4px;
            color: var(--gold);
        }

        .tier-desc {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tier-section-internal .tier-label {
            color: var(--red);
        }

        .tier-section-internal .tier-header {
            border-bottom-color: rgba(244, 67, 54, 0.3);
        }

        .internal-watermark {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: rgba(244, 67, 54, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-left: auto;
        }

        /* Category Headers */
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 28px 0 14px;
        }

        .category-header:first-child {
            margin-top: 0;
        }

        .category-tag {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 3px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .category-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .sort-btn {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            background: transparent;
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-btn:hover, .sort-btn.active {
            color: var(--gold);
            border-color: var(--gold);
        }

        /* Card Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .kpi-grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .kpi-grid-wide {
            grid-template-columns: 1fr;
        }

        @media (max-width: 900px) {
            .kpi-grid, .kpi-grid-3 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .header-main { flex-direction: column; gap: 8px; padding: 10px 16px; }
            .header-left, .header-right { min-width: auto; }
            .header-pills { padding: 8px 16px; flex-wrap: wrap; }
            .main { padding-left: 12px; padding-right: 12px; padding-top: 180px; }
        }

        /* KPI Card */
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px 20px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .kpi-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-accent);
        }

        .kpi-card-internal {
            border-color: rgba(244, 67, 54, 0.2);
        }

        .kpi-card-internal:hover {
            border-color: rgba(244, 67, 54, 0.4);
        }

        .kpi-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .kpi-category {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .kpi-sparkline {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
        }

        .spark-bar {
            width: 4px;
            border-radius: 1px;
            background: var(--border-accent);
            transition: height 0.3s ease;
        }

        .spark-bar:last-child {
            background: var(--gold);
        }

        .spark-bar-pb {
            position: absolute;
            width: 100%;
            height: 1px;
            background: var(--gold);
            opacity: 0.4;
        }

        .kpi-name {
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 400;
        }

        .kpi-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            line-height: 1;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .kpi-value-small {
            font-size: 32px;
        }

        .kpi-sub-value {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .kpi-delta {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .kpi-delta-green {
            color: var(--green);
            background: rgba(76, 175, 80, 0.1);
        }

        .kpi-delta-red {
            color: var(--red);
            background: rgba(244, 67, 54, 0.1);
        }

        .kpi-delta-neutral {
            color: var(--text-dim);
            background: rgba(85, 85, 85, 0.15);
        }

        .kpi-delta-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            color: var(--text-dim);
            margin-left: 4px;
        }

        /* Zone Ring */
        .zone-ring {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            vertical-align: middle;
        }

        .zone-green { background: var(--zone-green); box-shadow: 0 0 6px var(--zone-green); }
        .zone-yellow { background: var(--zone-yellow); box-shadow: 0 0 6px var(--zone-yellow); }
        .zone-red { background: var(--zone-red); box-shadow: 0 0 6px var(--zone-red); }

        /* Progress Bar */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 10px;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--gold);
            transition: width 0.6s ease;
        }

        .progress-bar-label {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }

        .progress-label-text {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--text-dim);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 6px;
        }

        .badge-streak {
            color: var(--gold);
            background: var(--gold-dim);
        }

        .badge-milestone {
            color: var(--gold);
            background: var(--gold-dim);
            border: 1px solid rgba(201, 185, 122, 0.3);
        }

        .badge-alert {
            color: var(--red);
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.2);
        }

        /* Leaderboard */
        .leaderboard {
            list-style: none;
            margin-top: 8px;
        }

        .leaderboard li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .leaderboard li:last-child { border-bottom: none; }

        .lb-rank {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            width: 24px;
            text-align: center;
        }

        .lb-gold { color: #FFD700; }
        .lb-silver { color: #C0C0C0; }
        .lb-bronze { color: #CD7F32; }

        .lb-name { flex: 1; color: var(--text-primary); }
        .lb-value { color: var(--gold); }

        /* Mini Bar Chart */
        .mini-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 40px;
            margin-top: 8px;
        }

        .mini-bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 3px;
        }

        .mini-bar {
            width: 100%;
            border-radius: 2px;
            min-height: 2px;
            transition: height 0.4s ease;
        }

        .mini-bar-label {
            font-family: 'DM Mono', monospace;
            font-size: 8px;
            color: var(--text-dim);
        }

        /* Breakdown list */
        .breakdown-list {
            margin-top: 8px;
        }

        .breakdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
        }

        .breakdown-bar-bg {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .breakdown-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .breakdown-label { color: var(--text-secondary); min-width: 80px; }
        .breakdown-value { color: var(--text-primary); min-width: 30px; text-align: right; }

        /* Donut Chart */
        .donut-container {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
        }

        .donut-svg {
            width: 60px;
            height: 60px;
            transform: rotate(-90deg);
        }

        .donut-legend {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .donut-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .donut-legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Retention Funnel */
        .retention-funnel {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            margin-top: 10px;
            height: 80px;
        }

        .funnel-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .funnel-bar {
            width: 100%;
            border-radius: 3px 3px 0 0;
            transition: height 0.5s ease;
        }

        .funnel-label {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--text-dim);
        }

        .funnel-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
        }

        .funnel-drop {
            font-family: 'DM Mono', monospace;
            font-size: 8px;
            color: var(--red);
        }

        /* CTA Button */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--gold);
            background: var(--gold-dim);
            border: 1px solid rgba(201, 185, 122, 0.3);
            border-radius: 4px;
            padding: 4px 10px;
            cursor: pointer;
            margin-top: 8px;
            position: relative;
        }

        .cta-btn:hover .cta-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .cta-tooltip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
        }

        /* Heatmap */
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-top: 8px;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: 8px;
            color: var(--text-secondary);
        }

        /* Onboarding Funnel */
        .onboarding-funnel {
            margin-top: 10px;
        }

        .onboarding-step {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .onboarding-step-bar-bg {
            flex: 1;
            height: 14px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .onboarding-step-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .onboarding-step-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text-secondary);
            min-width: 70px;
        }

        .onboarding-step-pct {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text-primary);
            min-width: 40px;
            text-align: right;
        }

        .onboarding-drop {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--red);
            min-width: 50px;
            text-align: right;
        }

        /* Gold pulse animation */
        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(201, 185, 122, 0); }
            50% { box-shadow: 0 0 12px 2px rgba(201, 185, 122, 0.3); }
        }

        .kpi-card-pulse {
            animation: goldPulse 2s ease-in-out infinite;
        }

        /* Drag handle */
        .drag-handle {
            cursor: grab;
            color: var(--text-dim);
            font-size: 14px;
            position: absolute;
            top: 8px;
            left: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .sort-mode .drag-handle {
            opacity: 1;
        }

        .sort-mode .kpi-card {
            cursor: grab;
        }

        .sort-mode .kpi-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        /* Celebration state */
        .celebration {
            color: var(--green);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            margin-top: 6px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-main">
            <div class="header-left">
                <div class="header-logo">BAM OS</div>
                <div class="header-subtitle">Member Analytics</div>
            </div>
            <div class="header-center">
                <div class="header-academy">ADAPT Academy — Miami</div>
                <div class="header-period">March 2026</div>
            </div>
            <div class="header-right">
                <div class="academy-score-widget" id="academyScore"></div>
                <select class="comparison-select" id="comparisonMode">
                    <option value="avg">vs. Average Month</option>
                    <option value="last">vs. Last Month</option>
                    <option value="best">vs. Best Month</option>
                </select>
            </div>
        </div>
        <div class="header-pills">
            <div class="tier-pill tier-pill-basic" data-tier="basic">BASIC</div>
            <div class="tier-pill tier-pill-advanced" data-tier="advanced">ADVANCED</div>
            <div class="tier-pill tier-pill-internal" data-tier="internal">INTERNAL</div>
        </div>
    </header>

    <main class="main" id="dashboard"></main>

    <script>
    // ═══════════════════════════════════════════════════
    // MOCK DATA
    // ═══════════════════════════════════════════════════
    const MOCK_DATA = {

    // ═══════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════
    let state = {
        comparison: localStorage.getItem('bam_comparison') || 'avg',
        tiers: {
            basic: true,
            advanced: JSON.parse(localStorage.getItem('bam_tier_advanced') || 'false'),
            internal: JSON.parse(localStorage.getItem('bam_tier_internal') || 'false')
        },
        sortMode: false,
        sortOrder: JSON.parse(localStorage.getItem('bam_sort_order') || 'null')
    };

    // ═══════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════
    function getDelta(kpi) {
        const m = { avg: 'delta_vs_avg', last: 'delta_vs_last', best: 'delta_vs_best' };
        return kpi[m[state.comparison]] || 0;
    }

    function getCompLabel() {
        return { avg: 'vs. avg', last: 'vs. last mo', best: 'vs. best' }[state.comparison];
    }

    function deltaClass(val, inverted) {
        if (Math.abs(val) < 0.01) return 'kpi-delta-neutral';
        const positive = inverted ? val < 0 : val > 0;
        return positive ? 'kpi-delta-green' : 'kpi-delta-red';
    }

    function deltaArrow(val, inverted) {
        if (Math.abs(val) < 0.01) return '—';
        const positive = inverted ? val < 0 : val > 0;
        return positive ? '▲' : '▼';
    }

    function formatDelta(val, unit) {
        const prefix = val > 0 ? '+' : '';
        if (unit === '$') return `${prefix}$${Math.abs(val).toFixed(0)}`;
        if (unit === '%') return `${prefix}${val.toFixed(1)}pp`;
        return `${prefix}${typeof val === 'number' && val % 1 !== 0 ? val.toFixed(1) : val}`;
    }

    function formatValue(val, unit) {
        if (unit === '$') return `$${val.toLocaleString()}`;
        if (unit === '%') return `${val}%`;
        return val.toString();
    }

    function zoneColor(val, zones, inverted) {
        if (!zones) return null;
        if (inverted) {
            if (val <= zones.green) return 'green';
            if (val <= zones.yellow) return 'yellow';
            return 'red';
        }
        if (val >= zones.green) return 'green';
        if (val >= zones.yellow) return 'yellow';
        return 'red';
    }

    function sparklineHtml(history, allTimeBest) {
        if (!history || !history.length) return '';
        const max = Math.max(...history, allTimeBest || 0);
        const bars = history.map((v, i) => {
            const h = max > 0 ? Math.max(2, (v / max) * 20) : 2;
            return `<div class="spark-bar" style="height:${h}px"></div>`;
        }).join('');
        return `<div class="kpi-sparkline">${bars}</div>`;
    }

    function progressBarHtml(value, goal) {
        if (!goal) return '';
        const pct = Math.min(100, (value / goal) * 100);
        return `
            <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
            <div class="progress-bar-label">
                <span class="progress-label-text">${Math.round(pct)}%</span>
                <span class="progress-label-text">Goal: ${typeof goal === 'number' && goal >= 1000 ? goal.toLocaleString() : goal}</span>
            </div>`;
    }

    function streakHtml(streak) {
        if (!streak || streak < 3) return '';
        if (streak >= 12) return `<div class="badge badge-streak">\u{1F3C6} 1-year streak</div>`;
        if (streak >= 6) return `<div class="badge badge-streak">\u{1F525}\u{1F525} ${streak}-month streak</div>`;
        return `<div class="badge badge-streak">\u{1F525} ${streak}-month streak</div>`;
    }

    function zoneRingHtml(zone) {
        if (!zone) return '';
        return `<span class="zone-ring zone-${zone}"></span>`;
    }

    // ═══════════════════════════════════════════════════
    // CARD RENDERERS
    // ═══════════════════════════════════════════════════
    function renderStandardCard(kpi, extraContent) {
        const delta = getDelta(kpi);
        const zone = kpi.zones ? zoneColor(kpi.value, kpi.zones, kpi.inverted) : null;
        const isPB = kpi.allTimeBest !== undefined && kpi.value === kpi.allTimeBest;
        const pulseClass = isPB ? ' kpi-card-pulse' : '';
        const internalClass = kpi.tier === 3 ? ' kpi-card-internal' : '';
        const displayVal = kpi.unit === '$' ? `$${kpi.value.toLocaleString()}` : (kpi.unit === '%' ? `${kpi.value}%` : (kpi.value >= 0 ? (kpi.cumulative && kpi.value > 0 ? `+${kpi.value}` : kpi.value) : kpi.value));
        const valColor = kpi.id === 'KPI-004' ? (kpi.value >= 0 ? 'var(--green)' : 'var(--red)') : (kpi.id === 'KPI-071' ? (kpi.value >= 100 ? 'var(--gold)' : 'var(--red)') : 'var(--text-primary)');

        return `
        <div class="kpi-card${pulseClass}${internalClass}" data-kpi="${kpi.id}">
            <div class="kpi-card-top">
                <span class="kpi-category">${kpi.category}</span>
                ${sparklineHtml(kpi.history, kpi.allTimeBest)}
            </div>
            <div class="kpi-name">${kpi.name}</div>
            <div class="kpi-value" style="color:${valColor}">
                ${zoneRingHtml(zone)}${displayVal}
            </div>
            ${kpi.sub ? `<div class="kpi-sub-value">${kpi.sub}</div>` : ''}
            ${kpi.pctOfBase !== undefined ? `<div class="kpi-sub-value">${kpi.pctOfBase}% of active base</div>` : ''}
            ${kpi.pctOfAccounts !== undefined ? `<div class="kpi-sub-value">${kpi.pctOfAccounts}% of accounts</div>` : ''}
            <div>
                <span class="kpi-delta ${deltaClass(delta, kpi.inverted)}">${deltaArrow(delta, kpi.inverted)} ${formatDelta(delta, kpi.unit)}</span>
                <span class="kpi-delta-label">${getCompLabel()}</span>
            </div>
            ${isPB ? '<div class="badge badge-milestone">\u{1F3C6} Personal best</div>' : ''}
            ${kpi.isMilestone ? '<div class="badge badge-milestone">\u{1F3C6} Best month ever</div>' : ''}
            ${streakHtml(kpi.streak)}
            ${kpi.goal ? progressBarHtml(kpi.value, kpi.goal) : ''}
            ${kpi.hasCta ? `<button class="cta-btn">View Members \u{2192}<span class="cta-tooltip">Links to member directory in full BAM OS</span></button>` : ''}
            ${extraContent || ''}
        </div>`;
    }

    function renderBreakdownCard(kpi) {
        const maxVal = Math.max(...kpi.breakdown.map(b => b.value));
        const total = kpi.breakdown.reduce((s, b) => s + b.value, 0);
        const internalClass = kpi.tier === 3 ? ' kpi-card-internal' : '';
        const items = kpi.breakdown.map(b => {
            const pct = total > 0 ? (b.value / total * 100) : 0;
            const trendStr = b.trend !== undefined ? ` <span style="color:${b.trend >= 0 ? 'var(--green)' : 'var(--red)'}">${b.trend >= 0 ? '▲' : '▼'}${Math.abs(b.trend)}</span>` : '';
            const growthStr = b.growth !== undefined && b.growth ? ' <span style="color:var(--green);font-size:9px">▲ fastest</span>' : '';
            return `
                <div class="breakdown-item">
                    <span class="breakdown-label">${b.label}</span>
                    <div class="breakdown-bar-bg">
                        <div class="breakdown-bar-fill" style="width:${pct}%;background:${b.color || 'var(--gold)'}"></div>
                    </div>
                    <span class="breakdown-value">${kpi.unit === '$' ? '$' + b.value.toLocaleString() : b.value}${b.pct !== undefined ? ` (${b.pct}%)` : ''}${trendStr}${growthStr}</span>
                </div>`;
        }).join('');

        return `
        <div class="kpi-card${internalClass}" data-kpi="${kpi.id}">
            <div class="kpi-card-top">
                <span class="kpi-category">${kpi.category}</span>
            </div>
            <div class="kpi-name">${kpi.name}</div>
            <div class="breakdown-list">${items}</div>
        </div>`;
    }

    function renderRetentionFunnel() {
        const stages = [
            { label: '30d', value: MOCK_DATA.kpi036.value },
            { label: '60d', value: MOCK_DATA.kpi037.value },
            { label: '90d', value: MOCK_DATA.kpi038.value },
            { label: '6mo', value: MOCK_DATA.kpi039.value },
            { label: '12mo', value: MOCK_DATA.kpi040.value }
        ];
        const bars = stages.map((s, i) => {
            const h = (s.value / 100) * 70;
            const drop = i > 0 ? (stages[i-1].value - s.value).toFixed(1) : null;
            const color = s.value >= 80 ? 'var(--green)' : s.value >= 60 ? 'var(--yellow)' : 'var(--red)';
            return `
                <div class="funnel-stage">
                    <div class="funnel-value">${s.value}%</div>
                    <div class="funnel-bar" style="height:${h}px;background:${color}"></div>
                    <div class="funnel-label">${s.label}</div>
                    ${drop ? `<div class="funnel-drop">-${drop}pp</div>` : '<div class="funnel-drop">&nbsp;</div>'}
                </div>`;
        }).join('');

        return `
        <div class="kpi-card" data-kpi="KPI-036-040" style="grid-column:1/-1">
            <div class="kpi-card-top">
                <span class="kpi-category">Retention</span>
            </div>
            <div class="kpi-name">Retention Funnel (30d \u{2192} 12mo)</div>
            <div class="retention-funnel">${bars}</div>
        </div>`;
    }

    function renderLeaderboardCard(kpi) {
        const items = kpi.leaderboard.map((m, i) => {
            const rankClass = i === 0 ? 'lb-gold' : i === 1 ? 'lb-silver' : i === 2 ? 'lb-bronze' : '';
            return `<li><span class="lb-rank ${rankClass}">${i + 1}</span><span class="lb-name">${m.name}</span><span class="lb-value">${m.value}</span></li>`;
        }).join('');
        return `
        <div class="kpi-card" data-kpi="${kpi.id}">
            <div class="kpi-card-top">
                <span class="kpi-category">${kpi.category}</span>
            </div>
            <div class="kpi-name">${kpi.name}</div>
            <div class="kpi-sub-value">Sessions MTD</div>
            <ol class="leaderboard">${items}</ol>
        </div>`;
    }

    function renderDayOfWeekCard(kpi) {
        const maxAvg = Math.max(...kpi.days.map(d => d.avg));
        const peakDay = kpi.days.find(d => d.avg === maxAvg).label;
        const bars = kpi.days.map(d => {
            const h = maxAvg > 0 ? Math.max(3, (d.avg / maxAvg) * 36) : 3;
            const color = d.avg === maxAvg ? 'var(--gold)' : (d.avg === Math.min(...kpi.days.map(x => x.avg)) ? 'var(--text-dim)' : 'var(--border-accent)');
            return `
                <div class="mini-bar-item">
                    <div class="mini-bar" style="height:${h}px;background:${color}"></div>
                    <div class="mini-bar-label">${d.label}</div>
                </div>`;
        }).join('');
        return `
        <div class="kpi-card" data-kpi="${kpi.id}">
            <div class="kpi-card-top">
                <span class="kpi-category">${kpi.category}</span>
            </div>
            <div class="kpi-name">${kpi.name}</div>
            <div class="kpi-sub-value">Peak: ${peakDay} (avg ${maxAvg})</div>
            <div class="mini-bars">${bars}</div>
        </div>`;
    }

    function renderTimeslotCard(kpi) {
        const items = kpi.slots.map((s, i) => {
            const barW = kpi.slots[0].avg > 0 ? (s.avg / kpi.slots[0].avg * 100) : 0;
            const color = i === 0 ? 'var(--gold)' : 'var(--border-accent)';
            return `
                <div class="breakdown-item">
                    <span class="breakdown-label">${s.slot}</span>
                    <div class="breakdown-bar-bg">
                        <div class="breakdown-bar-fill" style="width:${barW}%;background:${color}"></div>
                    </div>
                    <span class="breakdown-value">avg ${s.avg}</span>
                </div>`;
        }).join('');
        return `
        <div class="kpi-card" data-kpi="${kpi.id}">
            <div class="kpi-card-top">
                <span class="kpi-category">${kpi.category}</span>
            </div>
            <div class="kpi-name">${kpi.name}</div>
            <div class="breakdown-list">${items}</div>
        </div>`;
    }

    function renderDonutCard(kpi) {
        const r = 24, c = 2 * Math.PI * r;
        const seg1 = kpi.voluntary / 100 * c;
        const seg2 = kpi.paymentFailure / 100 * c;
        return `
        <div class="kpi-card" data-kpi="${kpi.id}">
            <div class="kpi-card-top">
                <span class="kpi-category">${kpi.category}</span>
            </div>
            <div class="kpi-name">${kpi.name}</div>
            <div class="donut-container">
                <svg class="donut-svg" viewBox="0 0 56 56">
                    <circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--blue)" stroke-width="6" stroke-dasharray="${seg1} ${c - seg1}" />
                    <circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--red)" stroke-width="6" stroke-dasharray="${seg2} ${c - seg2}" stroke-dashoffset="-${seg1}" />
                </svg>
                <div class="donut-legend">
                    <div class="donut-legend-item"><span class="donut-legend-dot" style="background:var(--blue)"></span>Voluntary: ${kpi.voluntary}%</div>
                    <div class="donut-legend-item"><span class="donut-legend-dot" style="background:var(--red)"></span>Payment fail: ${kpi.paymentFailure}%</div>
                </div>
            </div>
        </div>`;
    }

    function renderOnboardingCard(kpi) {
        const maxDrop = Math.max(...kpi.steps.filter(s => s.drop).map(s => s.drop));
        const steps = kpi.steps.map(s => {
            const color = s.drop === maxDrop && s.drop > 0 ? 'var(--red)' : 'var(--green)';
            return `
                <div class="onboarding-step">
                    <span class="onboarding-step-label">${s.label}</span>
                    <div class="onboarding-step-bar-bg">
                        <div class="onboarding-step-bar" style="width:${s.pct}%;background:${color}"></div>
                    </div>
                    <span class="onboarding-step-pct">${s.pct}%</span>
                    ${s.drop ? `<span class="onboarding-drop">${s.drop === maxDrop ? '\u{26A0}\u{FE0F} ' : ''}-${s.drop}%</span>` : '<span class="onboarding-drop">&nbsp;</span>'}
                </div>`;
        }).join('');
        return `
        <div class="kpi-card kpi-card-internal" data-kpi="${kpi.id}">
            <div class="kpi-card-top">
                <span class="kpi-category">${kpi.category}</span>
            </div>
            <div class="kpi-name">${kpi.name}</div>
            <div class="kpi-value">${kpi.value}%</div>
            <div class="kpi-sub-value">Full completion rate</div>
            <div class="onboarding-funnel">${steps}</div>
            <div class="kpi-sub-value" style="margin-top:6px;color:var(--red)">Biggest drop: Payment step (-9.2%)</div>
        </div>`;
    }

    function renderAtRiskCard(kpi) {
        const delta = getDelta(kpi);
        const hasNoRed = kpi.redCount === 0;
        return `
        <div class="kpi-card" data-kpi="${kpi.id}">
            <div class="kpi-card-top">
                <span class="kpi-category">${kpi.category}</span>
                ${sparklineHtml(kpi.history, kpi.allTimeBest)}
            </div>
            <div class="kpi-name">${kpi.name}</div>
            <div class="kpi-value">${kpi.value}</div>
            <div class="kpi-sub-value">${kpi.pctOfBase}% of active base</div>
            <div style="display:flex;gap:12px;margin-bottom:8px">
                <span style="font-family:'DM Mono',monospace;font-size:12px"><span class="zone-ring zone-yellow"></span>Yellow: ${kpi.yellowCount}</span>
                <span style="font-family:'DM Mono',monospace;font-size:12px"><span class="zone-ring zone-red"></span>Red: ${kpi.redCount}</span>
            </div>
            <div>
                <span class="kpi-delta ${deltaClass(delta, true)}">${deltaArrow(delta, true)} ${formatDelta(delta)}</span>
                <span class="kpi-delta-label">${getCompLabel()}</span>
            </div>
            ${hasNoRed ? '<div class="celebration">\u{1F7E2} No critical members</div>' : ''}
            ${kpi.hasCta ? `<button class="cta-btn">View Queue \u{2192}<span class="cta-tooltip">Links to member directory in full BAM OS</span></button>` : ''}
        </div>`;
    }

    // ═══════════════════════════════════════════════════
    // RENDER CARD BY KPI KEY
    // ═══════════════════════════════════════════════════
    function renderCard(key) {
        const kpi = MOCK_DATA[key];
        // Special renderers
        if (key === 'kpi005' || key === 'kpi006' || key === 'kpi007' || key === 'kpi063' || key === 'kpi072' || key === 'kpi073') return renderBreakdownCard(kpi);
        if (key === 'kpi029') return renderLeaderboardCard(kpi);
        if (key === 'kpi031') return renderDayOfWeekCard(kpi);
        if (key === 'kpi032') return renderTimeslotCard(kpi);
        if (key === 'kpi067') return renderDonutCard(kpi);
        if (key === 'kpi010') return renderOnboardingCard(kpi);
        if (key === 'kpi045') return renderAtRiskCard(kpi);
        if (key === 'kpi028') {
            return renderStandardCard(kpi, `<div class="kpi-sub-value" style="margin-top:4px">\u{1F3C6} Holder: ${kpi.holder}</div>`);
        }
        return renderStandardCard(kpi);
    }

    // ═══════════════════════════════════════════════════
    // ACADEMY SCORE
    // ═══════════════════════════════════════════════════
    function computeAcademyScore() {
        let score = 0;
        // Active members toward goal
        score += Math.min(20, (MOCK_DATA.kpi001.value / MOCK_DATA.kpi001.goal) * 20);
        // Churn rate below 5%
        score += MOCK_DATA.kpi034.value <= 5 ? 20 : Math.max(0, 20 - (MOCK_DATA.kpi034.value - 5) * 4);
        // MRR growing
        score += MOCK_DATA.kpi056.value > 0 ? Math.min(20, MOCK_DATA.kpi056.value * 1.6) : 0;
        // At-risk below 10%
        const riskPct = MOCK_DATA.kpi045.pctOfBase;
        score += riskPct <= 10 ? 20 : Math.max(0, 20 - (riskPct - 10) * 2);
        // Attendance above 75%
        score += MOCK_DATA.kpi021.value >= 75 ? 20 : Math.max(0, (MOCK_DATA.kpi021.value / 75) * 20);
        return Math.round(score);
    }

    function renderAcademyScore() {
        const score = computeAcademyScore();
        const color = score >= 70 ? 'var(--green)' : score >= 45 ? 'var(--yellow)' : 'var(--red)';
        const r = 18, c = 2 * Math.PI * r;
        const offset = c - (score / 100) * c;
        document.getElementById('academyScore').innerHTML = `
            <div class="score-ring">
                <svg viewBox="0 0 44 44">
                    <circle class="score-ring-bg" cx="22" cy="22" r="${r}"/>
                    <circle class="score-ring-fill" cx="22" cy="22" r="${r}" stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
                </svg>
                <span class="score-number">${score}</span>
            </div>
            <div class="score-label">
                <span class="score-label-title">Academy Score</span>
                <span class="score-label-delta" style="color:var(--green)">+3 vs. last mo</span>
            </div>`;
    }

    // ═══════════════════════════════════════════════════
    // MAIN RENDER
    // ═══════════════════════════════════════════════════
    function groupByCategory(keys) {
        const groups = {};
        keys.forEach(k => {
            const cat = MOCK_DATA[k].category;
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(k);
        });
        return groups;
    }

    function renderTier(tierNum, label, desc, kpiKeys, gridClass, extra) {
        const groups = groupByCategory(kpiKeys);
        const catOrder = ['Volume', 'Engagement', 'Retention', 'Retention Risk', 'Revenue', 'Operations', 'Communication', 'Growth', 'Internal — Activation', 'Internal — Churn'];
        let cardsHtml = '';
        catOrder.forEach(cat => {
            if (!groups[cat]) return;
            const sortable = cat === 'Volume' && tierNum === 1;
            cardsHtml += `
                <div class="category-header">
                    <span class="category-tag">${cat}</span>
                    <div class="category-line"></div>
                    ${sortable ? '<button class="sort-btn" onclick="toggleSort(this)">Sort</button>' : ''}
                </div>`;

            // Retention funnel
            if (cat === 'Retention' && tierNum === 2) {
                const retKeys = groups[cat].filter(k => !['kpi036','kpi037','kpi038','kpi039','kpi040'].includes(k));
                cardsHtml += `<div class="kpi-grid ${gridClass}">${renderRetentionFunnel()}`;
                retKeys.forEach(k => cardsHtml += renderCard(k));
                cardsHtml += '</div>';
            } else {
                cardsHtml += `<div class="kpi-grid ${gridClass}" ${sortable ? 'id="sortable-volume"' : ''}>`;
                groups[cat].forEach(k => cardsHtml += renderCard(k));
                cardsHtml += '</div>';
            }
        });

        const internalClass = tierNum === 3 ? ' tier-section-internal' : '';
        const watermark = tierNum === 3 ? '<span class="internal-watermark">INTERNAL \u{2014} BAM OS ONLY</span>' : '';
        return `
        <section class="tier-section${internalClass}" data-tier="${tierNum}" ${tierNum > 1 && !state.tiers[tierNum === 2 ? 'advanced' : 'internal'] ? 'style="display:none"' : ''}>
            <div class="tier-header">
                <span class="tier-label">${label}</span>
                <span class="tier-desc">${desc}</span>
                ${watermark}
            </div>
            ${extra || ''}
            ${cardsHtml}
        </section>`;
    }

    function render() {
        const tier1Keys = Object.keys(MOCK_DATA).filter(k => MOCK_DATA[k].tier === 1);
        const tier2Keys = Object.keys(MOCK_DATA).filter(k => MOCK_DATA[k].tier === 2);
        const tier3Keys = Object.keys(MOCK_DATA).filter(k => MOCK_DATA[k].tier === 3);

        let html = '';
        html += renderTier(1, 'TIER 1 \u{2014} BASIC', 'Core KPIs', tier1Keys, '');
        html += renderTier(2, 'TIER 2 \u{2014} ADVANCED', 'Deeper metrics', tier2Keys, 'kpi-grid-3');
        html += renderTier(3, 'TIER 3 \u{2014} INTERNAL', 'BAM OS data collection', tier3Keys, 'kpi-grid-3');

        document.getElementById('dashboard').innerHTML = html;
        renderAcademyScore();
    }

    // ═══════════════════════════════════════════════════
    // EVENT HANDLERS
    // ═══════════════════════════════════════════════════
    document.getElementById('comparisonMode').value = state.comparison;
    document.getElementById('comparisonMode').addEventListener('change', function() {
        state.comparison = this.value;
        localStorage.setItem('bam_comparison', this.value);
        render();
    });

    document.querySelectorAll('.tier-pill').forEach(pill => {
        const tier = pill.dataset.tier;
        if (tier !== 'basic' && state.tiers[tier]) pill.classList.add('active');
        pill.addEventListener('click', function() {
            if (tier === 'basic') return;
            state.tiers[tier] = !state.tiers[tier];
            localStorage.setItem('bam_tier_' + tier, JSON.stringify(state.tiers[tier]));
            this.classList.toggle('active');
            const section = document.querySelector(`[data-tier="${tier === 'advanced' ? 2 : 3}"]`);
            if (section) section.style.display = state.tiers[tier] ? '' : 'none';
        });
    });

    function toggleSort(btn) {
        btn.classList.toggle('active');
        const grid = document.getElementById('sortable-volume');
        if (grid) grid.classList.toggle('sort-mode');
    }

    // ═══════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════
    render();
    </script>
</body>
</html>
