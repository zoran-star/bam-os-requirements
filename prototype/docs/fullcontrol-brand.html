  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\", \"Inter\", sans-serif;\n    --serif:\"Fraunces\", Georgia, serif;\n  }\n  *{box-sizing:border-box; margin:0; padding:0;}\n  html,body{background:var(--ink); color:var(--paper); font-family:var(--sans); font-feature-settings:\"ss01\",\"cv11\"; -webkit-font-smoothing:antialiased;}\n  body{max-width:1440px; margin:0 auto;}\n  a{color:inherit;}\n\n  /* ─── Section scaffold ─────────────────────────── */\n  .section{padding:120px 80px; border-bottom:1px solid var(--line-dark); position:relative;}\n  .section.light{background:var(--paper); color:var(--ink); border-bottom-color:var(--line-light);}\n  .section.neutral{background:var(--ink-2);}\n  .section-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:64px; padding-bottom:24px; border-bottom:1px solid var(--line-dark);}\n  .light .section-head{border-bottom-color:var(--line-light);}\n  .section-kicker{font-family:var(--mono); font-size:11px; letter-spacing:0.18em; text-transform:uppercase; opacity:0.55;}\n  .section-title{font-family:var(--display); font-size:56px; font-weight:500; letter-spacing:-0.02em; line-height:1; flex:1; padding:0 48px;}\n  .section-meta{font-family:var(--mono); font-size:11px; letter-spacing:0.1em; opacity:0.55; text-align:right; white-space:nowrap;}\n\n  /* ─── Hero ─────────────────────────── */\n  .hero{min-height:900px; padding:64px 80px 80px; display:flex; flex-direction:column; position:relative; overflow:hidden;}\n  .hero-top{display:flex; justify-content:space-between; align-items:center; font-family:var(--mono); font-size:11px; letter-spacing:0.15em; text-transform:uppercase; opacity:0.7;}\n  .hero-top .dot{width:6px; height:6px; border-radius:50%; background:var(--gold); display:inline-block; margin-right:8px; vertical-align:middle; animation:pulse 2.4s ease-in-out infinite;}\n  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}\n  .hero-mark-wrap{flex:1; display:flex; align-items:center; justify-content:center; position:relative; margin:40px ll Control logo mark library ──────────────────────────────────────\n// Each function returns an inline <svg> string. 400×400 viewBox unless noted.\n// Accepts { fg, accent, bg } color overrides.\n\nconst MARKS = {};\n\n// Shared helpers\nconst defaults = (o = {}) => ({\n  fg: o.fg || \"#F5F1E8\",\n  accent: o.accent || \"#E8C547\",\n  accent2: o.accent2 || \"#C9A55C\",\n  bg: o.bg || \"transparent\",\n  stroke: o.stroke ?? 10,\n  size: o.size || 400,\n});\n\n// ─── 01 · North Star Compass ─────────────────────────────────────────────\n// Four-point star with tick ring. Bold silhouette.\nMARKS.northStar = (opts) => {\n  const c = defaults(opts);\n  return `<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <linearGradient id=\"ns-grad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"#F4D788\"/>\n        <stop offset=\"0.5\" stop-color=\"${c.accent}\"/>\n        <stop offset=\"1\" stop-color=\"${c.accent2}\"/>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n    <circle cx=\"200\" cy=\"200\" r=\"180\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"2\" opacity=\"0.3\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"160\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"1\" opacity=\"0.2\"/>\n    <g stroke=\"${c.fg}\" stroke-width=\"2\" opacity=\"0.5\">\n      ${Array.from({length:16}).map((_,i)=>{\n        const a = (i/16)*Math.PI*2 - Math.PI/2;\n        const x1 = 200+Math.cos(a)*180, y1 = 200+Math.sin(a)*180;\n        const x2 = 200+Math.cos(a)*(i%4===0?168:174), y2 = 200+Math.sin(a)*(i%4===0?168:174);\n        return `<line x1=\"${x1}\" y1=\"${y1}\" x2=\"${x2}\" y2=\"${y2}\"/>`;\n      }).join(\"\")}\n    <\u002Fg>\n    <!-- 4-point star -->\n    <path d=\"M 200 40 L 225 180 L 360 200 L 225 220 L 200 360 L 175 220 L 40 200 L 175 180 Z\"\n      fill=\"url(#ns-grad)\" stroke=\"${c.accent2}\" stroke-width=\"1\"/>\n    <!-- inner diamond detail -->\n    <path d=\"M 200 110 L 215 200 L 200 290 L 185 200 Z\" fill=\"${c.bg==='transparent'?'#0A0A0B':c.bg}\" opacity=\"0.25\"/>\n    <path d=\"M 110 200 L 200 215 L 290 200 L 200 185 Z\" fill=\"${c.bg==='transparent'?'#0A0A0B':c.bg}\" opacity=\"0.15\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"6\" fill=\"${c.accent}\"/>\n  <\u002Fsvg>`;\n};\n\n// ─── 02 · FC Monogram with compass arrow ─────────────────────────────────\nMARKS.fcMonogram = (opts) => {\n  const c = defaults(opts);\n  return `<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n    <!-- Outer circle -->\n    <circle cx=\"200\" cy=\"200\" r=\"190\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"2\"/>\n    <!-- Cardinal ticks -->\n    <g stroke=\"${c.fg}\" stroke-width=\"3\">\n      <line x1=\"200\" y1=\"10\" x2=\"200\" y2=\"26\"/>\n      <line x1=\"200\" y1=\"374\" x2=\"200\" y2=\"390\"/>\n      <line x1=\"10\" y1=\"200\" x2=\"26\" y2=\"200\"/>\n      <line x1=\"374\" y1=\"200\" x2=\"390\" y2=\"200\"/>\n    <\u002Fg>\n    <!-- F letterform, angular -->\n    <g fill=\"${c.fg}\">\n      <rect x=\"108\" y=\"108\" width=\"24\" height=\"184\"/>\n      <rect x=\"108\" y=\"108\" width=\"120\" height=\"22\"/>\n      <rect x=\"108\" y=\"188\" width=\"92\" height=\"22\"/>\n    <\u002Fg>\n    <!-- C letterform with compass needle gap at top -->\n    <path d=\"M 292 108 L 292 130 L 212 130 L 212 270 L 292 270 L 292 292 L 194 292 L 194 130 Z\"\n      fill=\"${c.fg}\" opacity=\"0\"/>\n    <!-- Elegant C as arc -->\n    <path d=\"M 292 140\n             A 70 70 0 0 0 222 200\n             A 70 70 0 0 0 292 260\"\n      fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"22\" stroke-linecap=\"square\"/>\n    <!-- Gold compass needle diagonally through -->\n    <path d=\"M 60 340 L 200 200 L 340 60 L 215 200 Z\" fill=\"${c.accent}\" opacity=\"0.95\"/>\n    <path d=\"M 60 340 L 200 200 L 185 215 Z\" fill=\"${c.accent2}\" opacity=\"0.7\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"8\" fill=\"${c.accent}\" stroke=\"${c.bg==='transparent'?'#0A0A0B':c.bg}\" stroke-width=\"2\"/>\n  <\u002Fsvg>`;\n};\n\n// ─── 03 · Geometric Compass Rose (8-point) ───────────────────────────────\nMARKS.rose = (opts) => {\n  const c = defaults(opts);\n  return `<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <linearGradient id=\"rose-grad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"#F4D788\"/>\n        <stop offset=\"1\" stop-color=\"${c.accent2}\"/>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n    <!-- Cardinal points -->\n    <path d=\"M 200 30 L 220 200 L 200 370 L 180 200 Z\" fill=\"${c.fg}\"/>\n    <path d=\"M 30 200 L 200 220 L 370 200 L 200 180 Z\" fill=\"${c.fg}\" opacity=\"0.7\"/>\n    <!-- Intercardinal (gold) -->\n    <path d=\"M 80 80 L 200 200 L 320 320 L 200 200 Z\" fill=\"url(#rose-grad)\" opacity=\"0.9\"/>\n    <path d=\"M 320 80 L 200 200 L 80 320 L 200 200 Z\" fill=\"url(#rose-grad)\" opacity=\"0.9\"/>\n    <!-- Center hub -->\n    <circle cx=\"200\" cy=\"200\" r=\"14\" fill=\"${c.bg==='transparent'?'#0A0A0B':c.bg}\" stroke=\"${c.accent}\" stroke-width=\"3\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"4\" fill=\"${c.accent}\"/>\n    <!-- N marker -->\n    <text x=\"200\" y=\"24\" font-family=\"JetBrains Mono, monospace\" font-size=\"14\" font-weight=\"600\"\n      text-anchor=\"middle\" fill=\"${c.accent}\">N<\u002Ftext>\n  <\u002Fsvg>`;\n};\n\n// ─── 04 · Minimal FC Shield ──────────────────────────────────────────────\nMARKS.shield = (opts) => {\n  const c = defaults(opts);\n  return `<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n    <!-- Shield silhouette -->\n    <path d=\"M 200 40 L 340 90 L 340 220 Q 340 320 200 370 Q 60 320 60 220 L 60 90 Z\"\n      fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"3\"/>\n    <!-- Inner shield -->\n    <path d=\"M 200 70 L 320 115 L 320 220 Q 320 300 200 346 Q 80 300 80 220 L 80 115 Z\"\n      fill=\"${c.fg}\" opacity=\"0.04\"/>\n    <!-- Diagonal compass bar through shield -->\n    <g transform=\"translate(200,210) rotate(45)\">\n      <rect x=\"-140\" y=\"-6\" width=\"280\" height=\"12\" fill=\"${c.accent}\"/>\n      <rect x=\"-140\" y=\"-6\" width=\"140\" height=\"6\" fill=\"${c.accent2}\"/>\n    <\u002Fg>\n    <!-- F C initials -->\n    <text x=\"200\" y=\"225\" font-family=\"Space Grotesk, sans-serif\" font-size=\"110\" font-weight=\"600\"\n      text-anchor=\"middle\" fill=\"${c.fg}\" letter-spacing=\"-4\">FC<\u002Ftext>\n    <!-- Star at top -->\n    <path d=\"M 200 102 L 206 118 L 222 118 L 210 128 L 214 144 L 200 134 L 186 144 L 190 128 L 178 118 L 194 118 Z\"\n      fill=\"${c.accent}\"/>\n  <\u002Fsvg>`;\n};\n\n// ─── 05 · Compass Aperture (concentric precision) ────────────────────────\nMARKS.aperture = (opts) => {\n  const c = defaults(opts);\n  const acc = c.accent;\n  return `<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n    <!-- Outer bezel -->\n    <circle cx=\"200\" cy=\"200\" r=\"190\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"2\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"178\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"4\"/>\n    <!-- 60 minor ticks -->\n    <g stroke=\"${c.fg}\" stroke-width=\"1.5\" opacity=\"0.6\">\n      ${Array.from({length:60}).map((_,i)=>{\n        const a = (i/60)*Math.PI*2 - Math.PI/2;\n        const r1 = i%5===0?160:166;\n        const x1 = 200+Math.cos(a)*r1, y1 = 200+Math.sin(a)*r1;\n        const x2 = 200+Math.cos(a)*172, y2 = 200+Math.sin(a)*172;\n        return `<line x1=\"${x1}\" y1=\"${y1}\" x2=\"${x2}\" y2=\"${y2}\" stroke-width=\"${i%5===0?2.5:1}\"/>`;\n      }).join(\"\")}\n    <\u002Fg>\n    <!-- Cardinal labels -->\n    <g font-family=\"JetBrains Mono, monospace\" font-size=\"11\" font-weight=\"600\" text-anchor=\"middle\" fill=\"${c.fg}\">\n      <text x=\"200\" y=\"144\">N<\u002Ftext>\n      <text x=\"200\" y=\"266\">S<\u002Ftext>\n      <text x=\"138\" y=\"205\">W<\u002Ftext>\n      <text x=\"262\" y=\"205\">E<\u002Ftext>\n    <\u002Fg>\n    <!-- Aperture blades -->\n    <g fill=\"${acc}\">\n      <path d=\"M 200 200 L 240 140 L 200 100 Z\"/>\n      <path d=\"M 200 200 L 260 160 L 300 200 Z\" opacity=\"0.75\"/>\n      <path d=\"M 200 200 L 260 260 L 200 300 Z\" opacity=\"0.5\"/>\n      <path d=\"M 200 200 L 140 260 L 100 200 Z\" opacity=\"0.75\"/>\n      <path d=\"M 200 200 L 140 140 L 160 100 Z\" opacity=\"0.9\"/>\n    <\u002Fg>\n    <!-- Center -->\n    <circle cx=\"200\" cy=\"200\" r=\"14\" fill=\"${c.bg==='transparent'?'#0A0A0B':c.bg}\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"14\" fill=\"none\" stroke=\"${acc}\" stroke-width=\"2.5\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"4\" fill=\"${acc}\"/>\n  <\u002Fsvg>`;\n};\n\n// ─── 06 · Stacked chevrons (command rank + arrow) ────────────────────────\nMARKS.chevron = (opts) => {\n  const c = defaults(opts);\n  return `<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n    <!-- Outer frame -->\n    <rect x=\"20\" y=\"20\" width=\"360\" height=\"360\" rx=\"8\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"2\" opacity=\"0.3\"/>\n    <!-- Three stacked chevrons, opening upward -->\n    <g fill=\"none\" stroke-linejoin=\"miter\" stroke-linecap=\"square\">\n      <path d=\"M 80 280 L 200 160 L 320 280\" stroke=\"${c.fg}\" stroke-width=\"26\"/>\n      <path d=\"M 110 210 L 200 120 L 290 210\" stroke=\"${c.accent}\" stroke-width=\"22\"/>\n      <path d=\"M 140 148 L 200 88 L 260 148\" stroke=\"${c.accent2}\" stroke-width=\"18\"/>\n    <\u002Fg>\n    <!-- Base indicator line -->\n    <line x1=\"80\" y1=\"320\" x2=\"320\" y2=\"320\" stroke=\"${c.fg}\" stroke-width=\"2\" opacity=\"0.4\"/>\n    <g font-family=\"JetBrains Mono, monospace\" font-size=\"13\" font-weight=\"600\" fill=\"${c.fg}\" opacity=\"0.6\">\n      <text x=\"80\" y=\"348\">F<\u002Ftext>\n      <text x=\"308\" y=\"348\">C<\u002Ftext>\n    <\u002Fg>\n  <\u002Fsvg>`;\n};\n\n// ─── PRIMARY MARK (selected direction — FC compass aperture hybrid) ──────\n// This becomes our hero. Refined compass with FC hidden in the geometry.\nMARKS.primary = (opts) => {\n  const c = defaults(opts);\n  const darkBg = c.bg==='transparent' ? '#0A0A0B' : c.bg;\n  return `<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <linearGradient id=\"p-gold\" x1=\"0.2\" y1=\"0\" x2=\"0.8\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"#F4D788\"/>\n        <stop offset=\"0.45\" stop-color=\"${c.accent}\"/>\n        <stop offset=\"1\" stop-color=\"${c.accent2}\"/>\n      <\u002FlinearGradient>\n      <linearGradient id=\"p-gold-dim\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"${c.accent2}\"/>\n        <stop offset=\"1\" stop-color=\"#8B6F2A\"/>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n\n    <!-- Outer bezel ring -->\n    <circle cx=\"200\" cy=\"200\" r=\"192\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"1.5\" opacity=\"0.55\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"182\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"3\"/>\n\n    <!-- Degree ticks, 72 divisions (5° each) -->\n    <g stroke=\"${c.fg}\">\n      ${Array.from({length:72}).map((_,i)=>{\n        const a = (i/72)*Math.PI*2 - Math.PI/2;\n        const major = i%18===0, mid = i%9===0;\n        const inner = major?158:(mid?165:170);\n        const x1 = 200+Math.cos(a)*inner, y1 = 200+Math.sin(a)*inner;\n        const x2 = 200+Math.cos(a)*176, y2 = 200+Math.sin(a)*176;\n        return `<line x1=\"${x1}\" y1=\"${y1}\" x2=\"${x2}\" y2=\"${y2}\" stroke-width=\"${major?3:(mid?1.8:1)}\" opacity=\"${major?1:(mid?0.7:0.4)}\"/>`;\n      }).join(\"\")}\n    <\u002Fg>\n\n    <!-- Inner rim -->\n    <circle cx=\"200\" cy=\"200\" r=\"148\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"1\" opacity=\"0.35\"/>\n\n    <!-- F letterform sculpted into left-hand of compass needle -->\n    <!-- Primary north needle = F shape, sharp gold -->\n    <path d=\"M 200 58\n             L 216 120\n             L 260 120\n             L 260 140\n             L 216 140\n             L 216 172\n             L 248 172\n             L 248 192\n             L 216 192\n             L 200 200\n             L 184 192\n             L 184 58 Z\"\n      fill=\"url(#p-gold)\"\n      stroke=\"${c.accent2}\" stroke-width=\"0.5\"/>\n\n    <!-- South needle (dim) forming C arc below center -->\n    <path d=\"M 200 200\n             L 184 208\n             L 170 342\n             Q 200 352 230 342\n             L 216 208 Z\"\n      fill=\"url(#p-gold-dim)\" opacity=\"0.85\"/>\n\n    <!-- East / West crossbar (slim, secondary) -->\n    <path d=\"M 58 200 L 140 196 L 140 204 Z\" fill=\"${c.fg}\" opacity=\"0.85\"/>\n    <path d=\"M 342 200 L 260 196 L 260 204 Z\" fill=\"${c.fg}\" opacity=\"0.85\"/>\n\n    <!-- Center hub -->\n    <circle cx=\"200\" cy=\"200\" r=\"16\" fill=\"${darkBg}\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"16\" fill=\"none\" stroke=\"${c.accent}\" stroke-width=\"2.5\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"5\" fill=\"${c.accent}\"/>\n\n    <!-- Cardinal N label -->\n    <text x=\"200\" y=\"38\" font-family=\"JetBrains Mono, monospace\" font-size=\"13\" font-weight=\"700\"\n      text-anchor=\"middle\" fill=\"${c.accent}\" letter-spacing=\"2\">N<\u002Ftext>\n  <\u002Fsvg>`;\n};\n\n// ─── PRIMARY — simplified, scales to small sizes ─────────────────────────\nMARKS.primarySimple = (opts) => {\n  const c = defaults(opts);\n  const darkBg = c.bg==='transparent' ? '#0A0A0B' : c.bg;\n  return `<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <linearGradient id=\"ps-gold\" x1=\"0.2\" y1=\"0\" x2=\"0.8\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"#F4D788\"/>\n        <stop offset=\"0.5\" stop-color=\"${c.accent}\"/>\n        <stop offset=\"1\" stop-color=\"${c.accent2}\"/>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n    <circle cx=\"200\" cy=\"200\" r=\"186\" fill=\"none\" stroke=\"${c.fg}\" stroke-width=\"6\"/>\n    <!-- F needle -->\n    <path d=\"M 200 60\n             L 218 130\n             L 258 130\n             L 258 150\n             L 218 150\n             L 218 180\n             L 246 180\n             L 246 200\n             L 218 200\n             L 200 210\n             L 182 200\n             L 182 60 Z\"\n      fill=\"url(#ps-gold)\"/>\n    <!-- South counterweight -->\n    <path d=\"M 200 210 L 182 220 L 172 330 Q 200 340 228 330 L 218 220 Z\" fill=\"${c.accent2}\"/>\n    <!-- EW bar -->\n    <rect x=\"60\" y=\"196\" width=\"80\" height=\"8\" fill=\"${c.fg}\"/>\n    <rect x=\"260\" y=\"196\" width=\"80\" height=\"8\" fill=\"${c.fg}\"/>\n    <!-- Hub -->\n    <circle cx=\"200\" cy=\"200\" r=\"14\" fill=\"${darkBg}\" stroke=\"${c.accent}\" stroke-width=\"3\"/>\n  <\u002Fsvg>`;\n};\n\n// ─── App icon — squircle with primary mark ───────────────────────────────\nMARKS.appIcon = (opts) => {\n  const c = defaults(opts);\n  const bg = opts?.bg || \"#0A0A0B\";\n  return `<svg viewBox=\"0 0 512 512\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <linearGradient id=\"app-bg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"#1C1C21\"/>\n        <stop offset=\"1\" stop-color=\"#0A0A0B\"/>\n      <\u002FlinearGradient>\n      <linearGradient id=\"app-gold\" x1=\"0.2\" y1=\"0\" x2=\"0.8\" y2=\"1\">\n        <stop offset=\"0\" stop-color=\"#F4D788\"/>\n        <stop offset=\"0.5\" stop-color=\"#E8C547\"/>\n        <stop offset=\"1\" stop-color=\"#C9A55C\"/>\n      <\u002FlinearGradient>\n      <radialGradient id=\"app-glow\" cx=\"0.5\" cy=\"0.4\" r=\"0.6\">\n        <stop offset=\"0\" stop-color=\"#E8C547\" stop-opacity=\"0.18\"/>\n        <stop offset=\"1\" stop-color=\"#E8C547\" stop-opacity=\"0\"/>\n      <\u002FradialGradient>\n    <\u002Fdefs>\n    <rect width=\"512\" height=\"512\" fill=\"url(#app-bg)\"/>\n    <rect width=\"512\" height=\"512\" fill=\"url(#app-glow)\"/>\n    <!-- Faint bezel ring -->\n    <circle cx=\"256\" cy=\"256\" r=\"220\" fill=\"none\" stroke=\"#2A2A31\" stroke-width=\"1.5\"/>\n    <circle cx=\"256\" cy=\"256 L 182 200\n             L 182 70 Z\"\n      fill=\"#0A0A0B\"/>\n    <path d=\"M 200 210 L 182 220 L 174 320 Q 200 328 226 320 L 218 220 Z\" fill=\"#0A0A0B\" opacity=\"0.55\"/>\n    <circle cx=\"200\" cy=\"200\" r=\"12\" fill=\"${c.accent}\" stroke=\"#0A0A0B\" stroke-width=\"3\"/>\n  <\u002Fsvg>`;\n};\n\nwindow.MARKS = MARKS;\n\n<\u002Fscript>\n<script>\n// ─── Sections renderer for Full Control brand doc ───────────────────────\n(function(){\n  const M = window.MARKS;\n\n  // ─── Selection registry ──────────────────────────────────────────────\n  // Each key is a direction. The functions return marks appropriate for\n  // that direction at different treatment levels (primary / simple / mono / appIcon).\n  // Simple / mono / appIcon variants are optional — if absent, the full mark is reused.\n  const DIRECTIONS = {\n    northStar: {\n      id: 'northStar',\n      num: '01',\n      name: 'North Star',\n      tagline: 'Set by the sky.',\n      caption: 'Four-point star inside a ticked bezel. Classical, navigational, confident.',\n      primary: (o) => M.northStar(o),\n      simple:  (o) => M.northStar(o),\n      mono:    (o) => {\n        const c = Object.assign({accent:'#E8C547'}, o||{});\n        return `<svg viewBox=\"0 0 400 400\"><circle cx=\"200\" cy=\"200\" r=\"186\" fill=\"${c.accent}\"/><path d=\"M 200 60 L 220 180 L 340 200 L 220 220 L 200 340 L 180 220 L 60 200 L 180 180 Z\" fill=\"#0A0A0B\"/><circle cx=\"200\" cy=\"200\" r=\"10\" fill=\"${c.accent}\" stroke=\"#0A0A0B\" stroke-width=\"3\"/><\u002Fsvg>`;\n      },\n      appIcon: () => `<svg viewBox=\"0 0 512 512\"><defs><linearGradient id=\"ns-app-bg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#1C1C21\"/><stop offset=\"1\" stop-color=\"#0A0A0B\"/><\u002FlinearGradient><linearGradient id=\"ns-app-g\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#F4D788\"/><stop offset=\"0.5\" stop-color=\"#E8C547\"/><stop offset=\"1\" stop-color=\"#C9A55C\"/><\u002FlinearGradient><\u002Fdefs><rect width=\"512\" height=\"512\" fill=\"url(#ns-app-bg)\"/><circle cx=\"256\" cy=\"256\" r=\"220\" fill=\"none\" stroke=\"#2A2A31\" stroke-width=\"1.5\"/><g stroke=\"#3A3A42\" stroke-width=\"2\">${Array.from({length:16}).map((_,i)=>{const a=(i/16)*Math.PI*2-Math.PI/2;return `<line x1=\"${256+Math.cos(a)*198}\" y1=\"${256+Math.sin(a)*198}\" x2=\"${256+Math.cos(a)*216}\" y2=\"${256+Math.sin(a)*216}\"/>`;}).join(\"\")}<\u002Fg><path d=\"M 256 80 L 290 230 L 432 256 L 290 282 L 256 432 L 222 282 L 80 256 L 222 230 Z\" fill=\"url(#ns-app-g)\"/><circle cx=\"256\" cy=\"256\" r=\"10\" fill=\"#E8C547\"/><\u002Fsvg>`,\n    },\n    fcMonogram: {\n      id: 'fcMonogram',\n      num: '02',\n      name: 'FC Monogram',\n      tagline: 'Letterform as instrument.',\n      caption: 'Hard-cut F + arc C bisected by a gold needle. Institutional read.',\n      primary: (o) => M.fcMonogram(o),\n      simple:  (o) => M.fcMonogram(o),\n      mono:    (o) => {\n        const c = Object.assign({accent:'#E8C547'}, o||{});\n        return `<svg viewBox=\"0 0 400 400\"><circle cx=\"200\" cy=\"200\" r=\"186\" fill=\"${c.accent}\"/><g fill=\"#0A0A0B\"><rect x=\"116\" y=\"116\" width=\"22\" height=\"168\"/><rect x=\"116\" y=\"116\" width=\"110\" height=\"22\"/><rect x=\"116\" y=\"188\" width=\"82\" height=\"22\"/><\u002Fg><path d=\"M 284 150 A 58 58 0 0 0 226 208 A 58 58 0 0 0 284 266\" fill=\"none\" stroke=\"#0A0A0B\" stroke-width=\"22\" stroke-linecap=\"square\"/><\u002Fsvg>`;\n      },\n      appIcon: () => `<svg viewBox=\"0 0 512 512\"><defs><linearGradient id=\"fc-app-bg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#1C1C21\"/><stop offset=\"1\" stop-color=\"#0A0A0B\"/><\u002FlinearGradient><\u002Fdefs><rect width=\"512\" height=\"512\" fill=\"url(#fc-app-bg)\"/><circle cx=\"256\" cy=\"256\" r=\"232\" fill=\"none\" stroke=\"#2A2A31\" stroke-width=\"2\"/><g stroke=\"#F5F1E8\" stroke-width=\"4\"><line x1=\"256\" y1=\"28\" x2=\"256\" y2=\"52\"/><line x1=\"256\" y1=\"460\" x2=\"256\" y2=\"484\"/><line x1=\"28\" y1=\"256\" x2=\"52\" y2=\"256\"/><line x1=\"460\" y1=\"256\" x2=\"484\" y2=\"256\"/><\u002Fg><g fill=\"#F5F1E8\"><rect x=\"144\" y=\"144\" width=\"30\" height=\"224\"/><rect x=\"144\" y=\"144\" width=\"148\" height=\"26\"/><rect x=\"144\" y=\"238\" width=\"116\" height=\"26\"/><\u002Fg><path d=\"M 360 180 A 88 88 0 0 0 272 256 A 88 88 0 0 0 360 332\" fill=\"none\" stroke=\"#F5F1E8\" stroke-width=\"28\" stroke-linecap=\"square\"/><path d=\"M 72 432 L 256 256 L 440 72 L 270 256 Z\" fill=\"#E8C547\" opacity=\"0.9\"/><circle cx=\"256\" cy=\"256\" r=\"12\" fill=\"#E8C547\" stroke=\"#0A0A0B\" stroke-width=\"3\"/><\u002Fsvg>`,\n    },\n    rose: {\n      id: 'rose',\n      num: '03',\n      name: 'Compass Rose',\n      tagline: 'Eight points, true.',\n      caption: '8-point rose with gold intercardinals. Traditional silhouette, modern geometry.',\n      primary: (o) => M.rose(o),\n      simple:  (o) => M.rose(o),\n      mono:    (o) => {\n        const c = Object.assign({accent:'#E8C547'}, o||{});\n        return `<svg viewBox=\"0 0 400 400\"><circle cx=\"200\" cy=\"200\" r=\"186\" fill=\"${c.accent}\"/><path d=\"M 200 60 L 216 200 L 200 340 L 184 200 Z\" fill=\"#0A0A0B\"/><path d=\"M 60 200 L 200 216 L 340 200 L 200 184 Z\" fill=\"#0A0A0B\" opacity=\"0.75\"/><path d=\"M 100 100 L 200 200 L 300 300 L 200 200 Z\" fill=\"#0A0A0B\" opacity=\"0.55\"/><path d=\"M 300 100 L 200 200 L 100 300 L 200 200 Z\" fill=\"#0A0A0B\" opacity=\"0.55\"/><circle cx=\"200\" cy=\"200\" r=\"10\" fill=\"${c.accent}\" stroke=\"#0A0A0B\" stroke-width=\"3\"/><\u002Fsvg>`;\n      },\n      appIcon: () => `<svg viewBox=\"0 0 512 512\"><defs><linearGradient id=\"r-app-bg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#1C1C21\"/><stop offset=\"1\" stop-color=\"#0A0A0B\"/><\u002FlinearGradient><linearGradient id=\"r-g\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#F4D788\"/><stop offset=\"1\" stop-colo =\"#F5F1E8\" stroke-width=\"34\"/><path d=\"M 136 268 L 256 148 L 376 268\" stroke=\"#E8C547\" stroke-width=\"30\"/><path d=\"M 176 188 L 256 108 L 336 188\" stroke=\"#C9A55C\" stroke-width=\"24\"/><\u002Fg><line x1=\"96\" y1=\"410\" x2=\"416\" y2=\"410\" stroke=\"#F5F1E8\" stroke-width=\"3\" opacity=\"0.4\"/><\u002Fsvg>`,\n    },\n  };\n\n  const ORDER = ['northStar','fcMonogram','rose','shield','primary','chevron'];\n\n  // ─── Current selection (persisted) ───────────────────────────────────\n  let currentKey = localStorage.getItem('fc.selected') || 'primary';\n  if (!DIRECTIONS[currentKey]) currentKey = 'primary';\n  const setKey = (k) => { currentKey = k; localStorage.setItem('fc.selected', k); renderAll(); };\n\n  const WORDMARKS = [\n    {id:'display',   label:'Space Grotesk',   note:'Display'},\n    {id:'elegant',   label:'Fraunces',        note:'Editorial'},\n    {id:'condensed', label:'Manrope 800',     note:'Condensed'},\n    {id:'mono',      label:'JetBrains Mono',  note:'Technical'},\n    {id:'spaced',    label:'Inter · Tracked', note:'Tracked caps'},\n  ];\n  let currentWord = localStorage.getItem('fc.wordmark') || 'display';\n  if (!WORDMARKS.find(w => w.id === currentWord)) currentWord = 'display';\n  const setWord = (w) => { currentWord = w; localStorage.setItem('fc.wordmark', w); renderAll(); };\n\n  const current = () => DIRECTIONS[currentKey];\n  const W = () => currentWord;\n\n  // ─── Wordmark helpers ────────────────────────────────────────────────\n  const wordmark = (variant = 'display', color = '#F5F1E8', accent = '#E8C547') => {\n    if (variant === 'display') {\n      return `<div style=\"font-family:Space Grotesk,sans-serif; font-size:56px; font-weight:600; letter-spacing:-0.035em; line-height:1; color:${color};\">Full<span style=\"color:${accent}\">Control<\u002Fspan><\u002Fdiv>`;\n    }\n    if (variant === 'elegant') {\n      return `<div style=\"font-family:Fraunces,serif; font-size:58px; font-weight:400; letter-spacing:-0.025em; lin
