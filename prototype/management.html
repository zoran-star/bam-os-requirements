<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAM OS — Management</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
<style>
/* =============================================
   BAM OS — Design System Tokens
   ============================================= */
:root {
  /* Fonts */
  --font-primary: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'DM Mono', monospace;

  /* Light theme (default) */
  --bg-primary: #FFFFFF;
  --bg-secondary: #F8F7F4;
  --card-bg: #FFFFFF;
  --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  --card-shadow-lifted: 0 8px 32px rgba(0, 0, 0, 0.12);
  --border: #E8E6E1;
  --border-accent: #D4D1C9;
  --gold: #C9B97A;
  --gold-light: #E2DD9F;
  --gold-dim: rgba(201, 185, 122, 0.15);
  --gold-hover: rgba(201, 185, 122, 0.25);
  --text-primary: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-dim: #9B9B9B;
  --green: #4caf50;
  --red: #f44336;
  --yellow: #f5c842;
  --blue: #45b7d1;
}

/* =============================================
   Reset & Base
   ============================================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: var(--font-primary);
  background: var(--bg-secondary);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* =============================================
   App Shell
   ============================================= */
.app-shell {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg-secondary);
  position: relative;
  display: flex;
  flex-direction: column;
}

/* =============================================
   Status Bar (mock)
   ============================================= */
.status-bar {
  height: 54px;
  padding: 0 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  background: var(--bg-primary);
  padding-bottom: 8px;
}
.status-bar-time {
  font-weight: 700;
  font-size: 15px;
}
.status-bar-icons {
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 12px;
  color: var(--text-secondary);
}

/* =============================================
   Header
   ============================================= */
.header {
  background: var(--bg-primary);
  padding: 4px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.header-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header-location {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 400;
}
.header-location-select {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
.header-location-select svg {
  width: 12px;
  height: 12px;
  color: var(--text-dim);
}

/* =============================================
   Management Blocks
   ============================================= */
.management-blocks {
  padding: 20px 20px 140px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.mgmt-block {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 28px 24px;
  min-height: 128px;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: var(--card-shadow);
  border: 1px solid var(--border);
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  position: relative;
  overflow: hidden;
}

.mgmt-block:active {
  transform: scale(0.98);
  box-shadow: var(--card-shadow-lifted);
}

.mgmt-block:hover {
  border-color: var(--gold);
}

/* Subtle gold accent line on left */
.mgmt-block::before {
  content: '';
  position: absolute;
  left: 0;
  top: 16px;
  bottom: 16px;
  width: 3px;
  background: var(--gold);
  border-radius: 0 3px 3px 0;
  opacity: 0.5;
  transition: opacity 0.2s ease;
}

.mgmt-block:hover::before {
  opacity: 1;
}

.mgmt-block-icon {
  width: 56px;
  height: 56px;
  min-width: 56px;
  background: var(--gold-dim);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s ease;
}

.mgmt-block:hover .mgmt-block-icon {
  background: var(--gold-hover);
}

.mgmt-block-icon svg {
  width: 28px;
  height: 28px;
  color: var(--gold);
}

.mgmt-block-content {
  flex: 1;
  min-width: 0;
}

.mgmt-block-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  line-height: 1.2;
}

.mgmt-block-hint {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 400;
  line-height: 1.4;
}

.mgmt-block-hint strong {
  font-weight: 600;
  color: var(--text-primary);
}

.mgmt-block-chevron {
  width: 20px;
  height: 20px;
  min-width: 20px;
  color: var(--text-dim);
  transition: color 0.2s ease, transform 0.2s ease;
}

.mgmt-block:hover .mgmt-block-chevron {
  color: var(--gold);
  transform: translateX(2px);
}

/* =============================================
   Floating Sage Button (persistent all tabs)
   ============================================= */
.sage-float {
  position: fixed;
  bottom: 96px;
  right: 50%;
  transform: translateX(calc(min(170px, 50vw - 68px)));
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sage-float-btn {
  width: 48px;
  height: 48px;
  background: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(201, 185, 122, 0.4);
  cursor: pointer;
  transition: transform 0.2s ease;
  border: none;
}
.sage-float-btn:active {
  transform: scale(0.92);
}
.sage-float-btn svg {
  width: 22px;
  height: 22px;
  color: #fff;
}

/* =============================================
   Bottom Nav
   ============================================= */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: var(--bg-primary);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 28px;
  z-index: 200;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 0;
  cursor: pointer;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s ease, background 0.15s ease;
  border-radius: 8px;
  margin: 0 2px;
}
.nav-item:hover {
  background: rgba(0,0,0,0.04);
}
.nav-item:active {
  transform: scale(0.9);
  background: rgba(0,0,0,0.06);
}
.nav-item:hover svg,
.nav-item:hover .nav-label {
  color: var(--text-primary);
}
.nav-item:active svg,
.nav-item:active .nav-label {
  color: var(--gold);
}
.nav-item svg {
  width: 22px;
  height: 22px;
  color: var(--text-dim);
  transition: color 0.15s ease;
}
.nav-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
  transition: color 0.15s ease;
}
.nav-item.active svg {
  color: var(--gold);
}
.nav-item.active .nav-label {
  color: var(--gold);
  font-weight: 700;
}
.nav-item.active:hover svg,
.nav-item.active:hover .nav-label {
  color: var(--gold);
}
</style>
</head>
