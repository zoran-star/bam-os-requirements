<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BAM Portal — Offline</title>
  <style>
    /* Self-contained: this page renders with NO network, so everything is
       inline — no remote fonts, no remote images. Matches the portal's ink
       theme + gold accent so the offline state still feels like the app. */
    :root { --ink:#16140F; --gold:#E8C547; --text:#F5F2EA; --mute:#8A857A; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; background: var(--ink); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-user-select: none; user-select: none; }
    .wrap { min-height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 32px calc(28px + env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)); gap: 18px; }
    .mark { width: 52px; height: 52px; border: 2px solid var(--gold); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; }
    .mark svg { width: 26px; height: 26px; }
    h1 { font-size: 22px; font-weight: 600; margin: 6px 0 0; letter-spacing: -0.01em; }
    p { color: var(--mute); font-size: 15px; line-height: 1.55; max-width: 300px; margin: 0; }
    button { margin-top: 10px; appearance: none; border: none; cursor: pointer;
      background: var(--gold); color: #1A1710; font-weight: 600; font-size: 15px;
      padding: 13px 26px; border-radius: 6px; letter-spacing: 0.01em; }
    button:active { opacity: 0.85; }
    .kicker { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mute);
      font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#E8C547" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0" />
        <path d="M1.42 9a16 16 0 0 1 21.16 0" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <div class="kicker">BAM Portal</div>
    <h1>You're offline</h1>
    <p>We couldn't reach the portal. Check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
  <script>
    // Auto-retry the moment the device comes back online.
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
