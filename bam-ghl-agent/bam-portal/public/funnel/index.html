<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BAM GTA — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter+Tight:wght@400;500;600;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="funnel.css" />
  <style>
    html, body { margin: 0; height: 100%; background: #060606; }
    #root { height: 100%; }
    /* Mobile-first design (≈402px). On wider screens, center it in a phone-width column. */
    @media (min-width: 520px) {
      #root { display: flex; justify-content: center; }
      #root > .funnel { width: 440px; max-width: 100%; box-shadow: 0 0 0 1px rgba(255,255,255,0.06); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Stripe.js (Payment Element; used when the funnel runs in live mode) -->
  <script src="https://js.stripe.com/v3/"></script>

  <!-- React + Babel (pinned, same as the design export) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- data (plain JS, loads first) -->
  <script src="data.js"></script>

  <!-- components + steps + app (JSX via Babel) -->
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="step1.jsx"></script>
  <script type="text/babel" src="step2.jsx"></script>
  <script type="text/babel" src="step3.jsx"></script>
  <script type="text/babel" src="success.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
