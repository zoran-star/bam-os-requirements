<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAM Asset Library</title>
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface2: #1C1C1C;
      --border: rgba(255,255,255,0.1);
      --ink: #fff;
      --muted: rgba(255,255,255,0.55);
      --gold: #E2DD9F;
      --font: 'Inter', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--ink); font-family: var(--font); font-size: 14px; min-height: 100vh; }

    /* ---- NAV ---- */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .nav-brand { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
    .nav-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    /* ---- LAYOUT ---- */
    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 53px); }

    /* ---- SIDEBAR ---- */
    .sidebar { border-right: 1px solid var(--border); padding: 24px 0; position: sticky; top: 53px; height: calc(100vh - 53px); overflow-y: auto; }
    .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); padding: 0 20px 10px; }
    .client-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 20px; background: none; border: none; cursor: pointer; text-align: left; color: var(--muted); transition: background .15s, color .15s; }
    .client-btn:hover { background: var(--surface); color: var(--ink); }
    .client-btn.active { background: var(--surface); color: var(--ink); border-left: 2px solid var(--gold); }
    .client-dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
    .client-btn-name { font-size: 13px; font-weight: 600; }
    .client-btn-loc { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ---- MAIN ---- */
    main { padding: 32px; overflow-y: auto; }
    .client-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 32px; }
    .client-title { font-size: 24px; font-weight: 700; }
    .client-meta { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border: 1px solid var(--border); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
    .chip a { color: inherit; text-decoration: none; }
    .chip a:hover { color: var(--ink); }

    /* ---- SECTION ---- */
    .section { margin-bottom: 40px; }
    .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ---- BRAND ASSETS ---- */
    .brand-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .asset-card { background: var(--surface); border: 1px solid var(--border); overflow: hidden; }
    .asset-img { width: 180px; height: 140px; object-fit: contain; background: #0F0F0F; display: block; padding: 12px; }
    .asset-img.cover { object-fit: cover; padding: 0; }
    .asset-label { padding: 8px 12px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
    .asset-url { padding: 0 12px 8px; font-size: 10px; color: rgba(255,255,255,0.3); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .copy-btn { display: block; margin: 0 12px 10px; padding: 5px 10px; background: none; border: 1px solid var(--border); color: var(--muted); font-size: 10px; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: border-color .15s, color .15s; }
    .copy-btn:hover { border-color: var(--gold); color: var(--gold); }
    .copy-btn.copied { border-color: #5fba7d; color: #5fba7d; }

    /* ---- GALLERY GRID ---- */
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .gallery-card { background: var(--surface); border: 1px solid var(--border); overflow: hidden; }
    .gallery-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    .gallery-card-foot { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .gallery-card-label { font-size: 11px; color: var(--muted); line-height: 1.3; }
    .gallery-card-num { font-size: 10px; color: rgba(255,255,255,0.2); font-weight: 700; flex: none; }

    /* ---- TESTIMONIALS ---- */
    .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .test-card { background: var(--surface); border: 1px solid var(--border); padding: 16px; }
    .test-quote { font-size: 13px; line-height: 1.55; color: rgba(255,255,255,0.8); margin-bottom: 12px; }
    .test-name { font-size: 12px; font-weight: 700; }
    .test-aff { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ---- EMPTY ---- */
    .empty { display: flex; align-items: center; justify-content: center; height: 300px; color: var(--muted); font-size: 13px; }
    .loading { color: var(--muted); font-size: 13px; padding: 40px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">BAM Asset Library</div>
  <div class="nav-sub">Portal · Media Registry</div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">Clients</div>
    <div id="client-list"><div class="loading">Loading…</div></div>
  </aside>

  <main id="main-content">
    <div class="empty">Select a client from the sidebar.</div>
  </main>
</div>

<script>
const INDEX_URL = '/assets/index.json';
let currentSlug = null;

async function loadIndex() {
  const res = await fetch(INDEX_URL);
  const data = await res.json();
  renderSidebar(data.clients);
  // auto-select first
  if (data.clients.length > 0) selectClient(data.clients[0]);
}

function renderSidebar(clients) {
  const list = document.getElementById('client-list');
  list.innerHTML = clients.map(c => `
    <button class="client-btn" data-slug="${c.slug}" onclick="selectClientBySlug('${c.slug}')">
      <span class="client-dot" style="background:${c.primary_color || '#888'}"></span>
      <span>
        <div class="client-btn-name">${c.name}</div>
        <div class="client-btn-loc">${c.location}</div>
      </span>
    </button>
  `).join('');
}

async function selectClientBySlug(slug) {
  const res = await fetch('/assets/index.json');
  const data = await res.json();
  const client = data.clients.find(c => c.slug === slug);
  if (client) selectClient(client);
}

async function selectClient(client) {
  currentSlug = client.slug;
  document.querySelectorAll('.client-btn').forEach(b => b.classList.toggle('active', b.dataset.slug === client.slug));

  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Loading assets…</div>';

  const res = await fetch(client.manifest);
  const data = await res.json();
  renderClient(client, data);
}

function copyToClipboard(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy URL'; btn.classList.remove('copied'); }, 1500);
  });
}

function assetCard(asset, coverFit = false) {
  return `
    <div class="asset-card">
      <img class="asset-img${coverFit ? ' cover' : ''}" src="${asset.url}" alt="${asset.label}" loading="lazy" />
      <div class="asset-label">${asset.label}</div>
      <div class="asset-url">${asset.url.replace('https://','')}</div>
      <button class="copy-btn" onclick="copyToClipboard('${asset.url}', this)">Copy URL</button>
    </div>
  `;
}

function renderClient(client, data) {
  const assets = data.assets || {};
  const gallery = assets.gallery || [];
  const testimonials = data.testimonials || [];
  const contact = data.contact || {};

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="client-header">
      <div>
        <div class="client-title">${data.name}</div>
        <div class="client-meta">
          <span class="chip">${data.location}</span>
          ${contact.phone ? `<span class="chip">${contact.phone}</span>` : ''}
          ${contact.email ? `<span class="chip"><a href="mailto:${contact.email}">${contact.email}</a></span>` : ''}
          ${client.site_url ? `<span class="chip"><a href="${client.site_url}" target="_blank">Live site</a></span>` : ''}
        </div>
      </div>
      <div class="chip" style="border-color:${data.primary_color};color:${data.primary_color}">
        ${data.primary_color}
      </div>
    </div>

    <!-- Brand -->
    <div class="section">
      <div class="section-title">Brand assets</div>
      <div class="brand-row">
        ${assets.logo ? assetCard(assets.logo) : ''}
        ${assets.founder_photo ? assetCard(assets.founder_photo, true) : ''}
      </div>
    </div>

    <!-- Gallery -->
    ${gallery.length > 0 ? `
    <div class="section">
      <div class="section-title">Gallery (${gallery.length} photos)</div>
      <div class="gallery-grid">
        ${gallery.map(p => `
          <div class="gallery-card">
            <img src="${p.url}" alt="${p.label}" loading="lazy" />
            <div class="gallery-card-foot">
              <div class="gallery-card-label">${p.label}</div>
              <div class="gallery-card-num">#${p.id}</div>
            </div>
            <button class="copy-btn" onclick="copyToClipboard('${p.url}', this)">Copy URL</button>
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}

    <!-- Testimonials -->
    ${testimonials.length > 0 ? `
    <div class="section">
      <div class="section-title">Testimonials (${testimonials.length})</div>
      <div class="test-grid">
        ${testimonials.map(t => `
          <div class="test-card">
            <div class="test-quote">"${t.quote}"</div>
            <div class="test-name">${t.name}</div>
            <div class="test-aff">${t.affiliation}</div>
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}
  `;
}

loadIndex();
</script>
</body>
</html>
