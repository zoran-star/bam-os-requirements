<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BAM · Connect GHLs</title>
  <link rel="icon" type="image/png" href="/favicon-32.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{ --bg:#0B0B0D; --surface:#15151a; --border:#2a2a31; --text:#EDEDED; --mute:#8a8a93; --gold:#E8C547; --green:#4cc76a; }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,system-ui,sans-serif;padding:28px}
    .wrap{max-width:680px;margin:0 auto}
    h1{font-size:22px;margin:0 0 4px}
    .sub{color:var(--mute);font-size:13px;margin-bottom:18px}
    .bar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .count{font-size:13px;color:var(--mute)}
    button{font:inherit;cursor:pointer}
    .refresh{background:none;border:1px solid var(--border);border-radius:8px;color:var(--mute);padding:7px 12px}
    .seclabel{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);font-weight:700;margin:18px 0 8px}
    .row{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--surface)}
    .nm{flex:1;min-width:0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tier{font-size:10px;color:var(--mute);border:1px solid var(--border);border-radius:999px;padding:1px 7px;flex:none}
    .pill{font-size:11px;flex:none}
    .pill.ok{color:var(--green)}
    .connect{background:var(--gold);color:#0B0B0D;border:none;border-radius:8px;padding:8px 16px;font-weight:700;flex:none}
    .connect:disabled{opacity:.5;cursor:wait}
    .no-loc{font-size:11px;color:var(--mute);flex:none}
    .msg{padding:16px;border:1px solid var(--border);border-radius:10px;color:var(--mute)}
    a{color:var(--gold)}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Connect academy GHLs</h1>
    <div class="sub">Per-location connect. Click <b>Connect</b> → pick that academy's location in GHL → approve → come back here. Staff only.</div>
    <div class="bar"><span class="count" id="count">Loading…</span><button class="refresh" onclick="load()">↻ Refresh</button></div>
    <div id="body"><div class="msg">Loading…</div></div>
  </div>
  <script>
    const _sb = supabase.createClient(
      'https://jnojmfmpnsfmtqmwhopz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impub2ptZm1wbnNmbXRxbXdob3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjI1ODQsImV4cCI6MjA5MDE5ODU4NH0.8vUj-MHg73yUtQR5i3VAbgrTyjvmTCMM6-U3mGxbGGo'
    );
    const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    async function token(){ const {data:{session}} = await _sb.auth.getSession(); return session && session.access_token; }

    async function load(){
      const body=document.getElementById('body'), count=document.getElementById('count');
      const t=await token();
      if(!t){ body.innerHTML='<div class="msg">Not signed in. Open the <a href="/client-portal.html">portal</a> and log in as staff (same browser), then refresh this page.</div>'; count.textContent=''; return; }
      body.innerHTML='<div class="msg">Loading academies…</div>';
      try{
        const r=await fetch('/api/messaging/connect?action=list',{headers:{Authorization:'Bearer '+t}});
        const j=await r.json();
        if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
        const a=j.academies||[];
        const connectable=a.filter(x=>x.has_location && !x.connected);
        const connected=a.filter(x=>x.connected);
        const noloc=a.filter(x=>!x.has_location);
        count.textContent=`${connected.length} connected · ${connectable.length} to connect · ${noloc.length} no GHL location`;
        const rowConnect = x=>`<div class="row"><span class="nm">${esc(x.name)}</span><span class="tier">${x.tier}</span><button class="connect" onclick="connect('${x.id}',this)">Connect</button></div>`;
        const rowOk = x=>`<div class="row" style="opacity:.6"><span class="nm">${esc(x.name)}</span><span class="tier">${x.tier}</span><span class="pill ok">✓ connected</span></div>`;
        const rowNo = x=>`<div class="row" style="opacity:.5"><span class="nm">${esc(x.name)}</span><span class="no-loc">no GHL location</span></div>`;
        body.innerHTML =
          (connectable.length?`<div class="seclabel">Connect these (${connectable.length})</div>`+connectable.map(rowConnect).join(''):'')+
          (connected.length?`<div class="seclabel">Connected (${connected.length})</div>`+connected.map(rowOk).join(''):'')+
          (noloc.length?`<div class="seclabel">No GHL location — can't connect (${noloc.length})</div>`+noloc.map(rowNo).join(''):'');
      }catch(e){ body.innerHTML='<div class="msg" style="color:#c9742f">Couldn\'t load — '+esc(e.message||e)+'</div>'; }
    }

    async function connect(id, btn){
      btn.disabled=true; btn.textContent='Opening GHL…';
      try{
        const t=await token();
        const r=await fetch('/api/messaging/connect',{method:'POST',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({client_id:id})});
        const j=await r.json();
        if(!r.ok||!j.redirect_url) throw new Error(j.error||('HTTP '+r.status));
        window.location.href=j.redirect_url;   // → GHL: pick this academy's location → approve
      }catch(e){ alert('Failed: '+(e.message||e)); btn.disabled=false; btn.textContent='Connect'; }
    }
    load();
  </script>
</body>
</html>
