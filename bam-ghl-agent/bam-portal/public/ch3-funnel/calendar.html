<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Your Free Trial — CH3 Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   rgba(255,255,255,0.10);
      --teal:     #00B8C8;
      --fg:       #ffffff;
      --fg-sub:   rgba(255,255,255,0.65);
      --fg-muted: rgba(255,255,255,0.38);
      --font-display: 'Anton', sans-serif;
      --font-body:    'Inter Tight', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* Header */
    .cal-header {
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .cal-brand {
      font-family: var(--font-display);
      font-size: 17px;
      letter-spacing: 0.04em;
    }
    .cal-brand em { color: var(--teal); font-style: normal; }
    .cal-step {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-muted);
    }
    .cal-progress {
      height: 3px;
      background: var(--surface);
    }
    .cal-progress__fill {
      height: 100%;
      width: 100%;
      background: var(--teal);
    }

    /* Intro section */
    .cal-intro {
      padding: 28px 20px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    .cal-intro__name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 6px;
    }
    .cal-intro__title {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .cal-intro__title em { color: var(--teal); font-style: normal; }
    .cal-intro__sub {
      font-size: 14px;
      color: var(--fg-sub);
      line-height: 1.55;
    }

    /* Group badge */
    .cal-group-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(0,184,200,0.10);
      border: 1px solid rgba(0,184,200,0.25);
      border-radius: 6px;
      padding: 7px 12px;
      margin: 18px 20px 0;
      max-width: calc(100% - 40px);
    }
    .cal-group-badge__dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      flex-shrink: 0;
    }
    .cal-group-badge__text {
      font-size: 13px;
      font-weight: 600;
      color: var(--teal);
    }
    .cal-group-badge__sub {
      font-size: 12px;
      color: var(--fg-muted);
      margin-left: 2px;
    }

    /* Calendar embed container */
    .cal-embed-wrap {
      padding: 20px 0 40px;
      max-width: 700px;
      margin: 0 auto;
    }
    .cal-embed-wrap iframe {
      width: 100%;
      border: none;
      min-height: 650px;
      background: var(--bg);
    }

    /* Reassurance strip */
    .cal-reassure {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--fg-muted);
    }
    .cal-reassure svg { flex-shrink: 0; }
  </style>
</head>
<body>

  <header class="cal-header">
    <div class="cal-brand">CH3 <em>TRAINING</em></div>
    <div class="cal-step">Step 3 of 3 &middot; Pick a time</div>
  </header>
  <div class="cal-progress"><div class="cal-progress__fill"></div></div>

  <div id="group-badge" class="cal-group-badge" style="display:none">
    <div class="cal-group-badge__dot"></div>
    <span class="cal-group-badge__text" id="group-label"></span>
    <span class="cal-group-badge__sub" id="group-times"></span>
  </div>

  <div class="cal-intro">
    <div class="cal-intro__name" id="name-greeting"></div>
    <h1 class="cal-intro__title">Book your <em>free</em> session.</h1>
    <p class="cal-intro__sub">
      Pick any open slot below. First session is 100% free — no payment required.
      Coach Haynes will confirm via text before your session.
    </p>
  </div>

  <div class="cal-embed-wrap">
    <!-- GHL calendar embed — swap the src with your actual calendar URL -->
    <iframe
      id="cal-frame"
      src=""
      title="Book a free trial session"
      allow="payment"
      loading="lazy"
    ></iframe>
  </div>

  <div class="cal-reassure">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    No payment info needed — this is just to reserve your free trial spot.
  </div>

  <script>
    // ─── Calendar IDs — replace these with your actual GHL calendar embed URLs ───
    // Youth calendar (Grades 5–8)
    var YOUTH_CALENDAR_URL = 'https://api.leadconnectorhq.com/widget/booking/YOUTH_CALENDAR_ID_HERE';
    // HS / College calendar (Grades 9–12 + College)
    var HS_CALENDAR_URL    = 'https://api.leadconnectorhq.com/widget/booking/HS_CALENDAR_ID_HERE';
    // ─────────────────────────────────────────────────────────────────────────────

    var GROUP_META = {
      youth: {
        label: 'Youth Group',
        times: 'Mon 6–7 PM · Fri 5:45–6:45 PM · Sun 5–6 PM',
        url: YOUTH_CALENDAR_URL,
      },
      hs: {
        label: 'HS / College Group',
        times: 'Mon & Wed 7–8 PM · Tue & Thu 6:30–7:30 PM',
        url: HS_CALENDAR_URL,
      },
    };

    (function () {
      var params = new URLSearchParams(window.location.search);
      var group  = (params.get('group') || 'hs').toLowerCase();
      var name   = params.get('name') || '';

      var meta = GROUP_META[group] || GROUP_META.hs;

      // Name greeting
      if (name) {
        var el = document.getElementById('name-greeting');
        el.textContent = "You're in, " + name + ".";
      }

      // Group badge
      document.getElementById('group-label').textContent = meta.label;
      document.getElementById('group-times').textContent = '· ' + meta.times;
      document.getElementById('group-badge').style.display = 'inline-flex';

      // Calendar iframe
      document.getElementById('cal-frame').src = meta.url;
    })();
  </script>
</body>
</html>
