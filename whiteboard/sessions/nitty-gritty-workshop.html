<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#08080a;color:#e4e4e7;line-height:1.6;padding:40px 24px 120px}
.container{max-width:900px;margin:0 auto}
h1{font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px}
.subtitle{font-size:14px;color:#71717a;margin-bottom:32px}
.category{margin-bottom:32px}
.cat-header{font-size:11px;font-weight:700;color:#c8a84e;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(200,168,78,0.15)}
.item{display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;align-items:start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.item:last-child{border-bottom:none}
.item input[type="checkbox"]{width:18px;height:18px;accent-color:#c8a84e;margin-top:2px;cursor:pointer}
.item-label{font-size:13px;color:#a1a1aa;cursor:pointer;transition:color 0.2s}
.item.checked .item-label{color:#e4e4e7}
.item-num{font-size:11px;color:#52525b;font-weight:600;min-width:28px}
.item-note{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:6px 10px;font-size:12px;color:#a1a1aa;font-family:inherit;resize:none;height:28px;width:100%;transition:border-color 0.2s,height 0.2s}
.item-note:focus{outline:none;border-color:rgba(200,168,78,0.3);height:56px;color:#e4e4e7}
.item-note::placeholder{color:#3f3f46}
.stats{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,10,0.95);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,0.06);padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:24px;z-index:100}
.stat-pill{font-size:13px;color:#71717a}
.stat-pill strong{color:#e4e4e7;font-weight:700}
.export-btn{background:linear-gradient(135deg,#c8a84e,#a8882e);color:#08080a;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;transition:transform 0.2s,opacity 0.2s}
.export-btn:hover{transform:translateY(-1px);opacity:0.9}
.export-btn:active{transform:translateY(0)}
.export-btn.copied{background:#22c55e}
.select-btns{display:flex;gap:8px;margin-bottom:24px}
.select-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;color:#71717a;cursor:pointer;transition:all 0.2s}
.select-btn:hover{border-color:rgba(200,168,78,0.2);color:#c8a84e}
</style>
</head>
<body>

  <p class="subtitle">Check items to include on the investor page. Add notes on the right. Export when done.</p>

  <div class="select-btns">
    <button class="select-btn" onclick="selectAll()">Select All</button>
    <button class="select-btn" onclick="deselectAll()">Deselect All</button>
    <button class="select-btn" onclick="selectCategory(this)" data-cat="all">Toggle by Category</button>
  </div>

  <div id="items"></div>
</div>

<div class="stats">
  <div class="stat-pill"><strong id="checkedCount">0</strong> / <span id="totalCount">0</span> selected</div>
  <button class="export-btn" id="exportBtn" onclick="exportForAI()">Export for AI</button>

const container = document.getElementById('items');
let totalItems = 0;

data.forEach(section => {
  const cat = document.createElement('div');
  cat.className = 'category';
  cat.innerHTML = `<div class="cat-header" data-cat-name="${section.cat}">${section.cat} (${section.items.length})</div>`;

  section.items.forEach(([num, text]) => {
    totalItems++;
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <input type="checkbox" id="item-${num}" data-num="${num}" onchange="toggleItem(this)">
      <label class="item-label" for="item-${num}"><span class="item-num">#${num}</span> ${text}</label>
      <textarea class="item-note" placeholder="Notes..." data-num="${num}"></textarea>
    `;
    cat.appendChild(div);
  });

  container.appendChild(cat);
});

document.getElementById('totalCount').textContent = totalItems;

function toggleItem(cb) {
  cb.closest('.item').classList.toggle('checked', cb.checked);
  updateCount();
}

function updateCount() {
  const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
  document.getElementById('checkedCount').textContent = checked;
}

function selectAll() {
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = true; cb.closest('.item').classList.add('checked'); });
  updateCount();
}

function deselectAll() {
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = false; cb.closest('.item').classList.remove('checked'); });
  updateCount();
}

function selectCategory(btn) {
  const cats = data.map(d => d.cat);
  const current = btn.dataset.currentCat || 0;
  const idx = parseInt(current);
  const catName = cats[idx % cats.length];

  // Toggle all in this category
  const header = document.querySelector(`[data-cat-name="${catName}"]`);
  if (header) {
    const category = header.closest('.category');
    const cbs = category.querySelectorAll('input[type="checkbox"]');
    const allChecked = Array.from(cbs).every(cb => cb.checked);
    cbs.forEach(cb => { cb.checked = !allChecked; cb.closest('.item').classList.toggle('checked', !allChecked); });
  }

  btn.textContent = `Toggle: ${cats[(idx + 1) % cats.length]}`;
  btn.dataset.currentCat = (idx + 1) % cats.length;
  updateCount();
}

function exportForAI() {
  const lines = ['---','export: nitty-gritty-workshop','date: ' + new Date().toISOString().split('T')[0],'---',''];
  const checked = document.querySelectorAll('input[type="checkbox"]:checked');

  if (checked.length === 0) {
    alert('No items selected!');
    return;
  }

  let currentCat = '';

  // Group by category
  data.forEach(section => {
    const catItems = [];
    section.items.forEach(([num, text]) => {
      const cb = document.getElementById(`item-${num}`);
      if (cb && cb.checked) {
        const note = document.querySelector(`textarea[data-num="${num}"]`).value.trim();
        catItems.push({ num, text, note });
      }
    });

    if (catItems.length > 0) {
      lines.push(`## ${section.cat}`);
      catItems.forEach(item => {
        lines.push(`- [x] #${item.num}: ${item.text}${item.note ? ` | NOTE: ${item.note}` : ''}`);
      });
      lines.push('');
    }
  });

  lines.push(`**Total selected: ${checked.length} / ${totalItems}**`);

  const output = lines.join('\n');
  navigator.clipboard.writeText(output).then(() => {
    const btn = document.getElementById('exportBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Export for AI'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
